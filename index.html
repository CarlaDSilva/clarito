<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Clarito" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>Clarito</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #0a0a0f;
      --bg1: #111118;
      --bg2: #18181f;
      --bg3: #22222c;
      --bg4: #2a2a36;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text: #f0f0f5;
      --text2: #a0a0b0;
      --text3: #606070;
      --accent: #7c6aff;
      --accent2: #a394ff;
      --green: #3dd68c;
      --red: #ff5c5c;
      --amber: #ffb347;
      --p1: #7c6aff;
      --p2: #ff6b9d;
      --radius: 16px;
      --radius-sm: 10px;
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); }
    body { font-family: var(--font); color: var(--text); -webkit-font-smoothing: antialiased; }
    #root { height: 100%; display: flex; flex-direction: column; }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

    /* LAYOUT */
    .app { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    .screen { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: calc(80px + var(--safe-bottom)); padding-top: calc(var(--safe-top) + 12px); }
    .screen-inner { padding: 0 16px; max-width: 480px; margin: 0 auto; }

    /* NAV */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(10,10,15,0.92);
      backdrop-filter: blur(20px) saturate(150%);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
      border-top: 1px solid var(--border);
      padding: 10px 0 calc(10px + var(--safe-bottom));
      display: flex; align-items: center; justify-content: space-around;
      z-index: 100;
    }
    .nav-btn {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      background: none; border: none; color: var(--text3); cursor: pointer;
      padding: 6px 16px; border-radius: 12px; transition: all 0.2s; position: relative;
      font-family: var(--font);
    }
    .nav-btn.active { color: var(--accent2); }
    .nav-btn.active .nav-icon { background: rgba(124,106,255,0.15); }
    .nav-icon { width: 44px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 10px; transition: background 0.2s; }
    .nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.3px; }
    .nav-badge {
      position: absolute; top: 2px; right: 10px;
      width: 8px; height: 8px; background: var(--red); border-radius: 50%;
      border: 1.5px solid var(--bg);
    }

    /* CARDS */
    .card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
    }
    .card-sm { padding: 12px; border-radius: var(--radius-sm); }

    /* HEADERS */
    .page-title { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 4px; }
    .page-sub { font-size: 14px; color: var(--text2); margin-bottom: 20px; }
    .section-title { font-size: 12px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; margin-top: 20px; }

    /* BUTTONS */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      border: none; border-radius: var(--radius-sm); cursor: pointer;
      font-family: var(--font); font-weight: 500; transition: all 0.15s; white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: white; padding: 13px 22px; font-size: 15px; width: 100%; border-radius: var(--radius); }
    .btn-primary:active { transform: scale(0.97); background: #6a58ee; }
    .btn-secondary { background: var(--bg3); color: var(--text); padding: 11px 18px; font-size: 14px; border: 1px solid var(--border2); }
    .btn-secondary:active { background: var(--bg4); }
    .btn-ghost { background: transparent; color: var(--text2); padding: 8px 12px; font-size: 14px; }
    .btn-danger { background: rgba(255,92,92,0.12); color: var(--red); padding: 11px 18px; font-size: 14px; border: 1px solid rgba(255,92,92,0.2); }
    .btn-sm { padding: 8px 14px; font-size: 13px; border-radius: 8px; }
    .btn-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--bg3); border: 1px solid var(--border); padding: 0; }

    /* INPUTS */
    .input-group { margin-bottom: 14px; }
    .input-label { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; letter-spacing: 0.3px; display: block; }
    .input {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px 14px; color: var(--text);
      font-family: var(--font); font-size: 15px; outline: none;
      transition: border-color 0.15s;
    }
    .input:focus { border-color: var(--accent); }
    .input::placeholder { color: var(--text3); }
    select.input { appearance: none; -webkit-appearance: none; cursor: pointer; }

    /* TAGS */
    .tag {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
    }
    .tag-green { background: rgba(61,214,140,0.12); color: var(--green); }
    .tag-red { background: rgba(255,92,92,0.12); color: var(--red); }
    .tag-amber { background: rgba(255,179,71,0.12); color: var(--amber); }
    .tag-accent { background: rgba(124,106,255,0.12); color: var(--accent2); }
    .tag-gray { background: var(--bg3); color: var(--text2); }

    /* PERSON PILL */
    .person-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .person-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px 3px 6px; border-radius: 20px; font-size: 12px; font-weight: 500;
    }

    /* AMOUNT */
    .amount { font-family: var(--mono); font-weight: 400; }
    .amount-lg { font-size: 32px; font-weight: 300; letter-spacing: -1px; }
    .amount-md { font-size: 20px; }

    /* DIVIDER */
    .divider { height: 1px; background: var(--border); margin: 14px 0; }

    /* ROW */
    .row { display: flex; align-items: center; justify-content: space-between; }
    .row-start { display: flex; align-items: center; gap: 10px; }
    .col { display: flex; flex-direction: column; gap: 2px; }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      animation: fadeIn 0.15s ease;
    }
    .modal {
      background: var(--bg1); border-radius: 24px 24px 0 0;
      border: 1px solid var(--border); border-bottom: none;
      width: 100%; max-width: 480px; max-height: 92vh;
      overflow-y: auto; padding: 20px 20px calc(24px + var(--safe-bottom));
      animation: slideUp 0.25s cubic-bezier(0.32,0.72,0,1);
    }
    .modal-handle { width: 36px; height: 4px; background: var(--bg4); border-radius: 2px; margin: 0 auto 20px; }
    .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* TOAST */
    .toast {
      position: fixed; top: calc(var(--safe-top) + 16px); left: 50%; transform: translateX(-50%);
      background: var(--bg2); border: 1px solid var(--border2); border-radius: 12px;
      padding: 12px 18px; font-size: 14px; z-index: 300; white-space: nowrap;
      animation: toastIn 0.2s ease; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    /* CONFIDENCE BAR */
    .conf-bar { height: 3px; border-radius: 2px; background: var(--bg3); overflow: hidden; }
    .conf-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

    /* CHAT */
    .chat-bubble {
      padding: 12px 14px; border-radius: 14px; max-width: 85%;
      font-size: 14px; line-height: 1.5; margin-bottom: 10px;
    }
    .chat-ai { background: var(--bg3); border-bottom-left-radius: 4px; align-self: flex-start; }
    .chat-user { background: var(--accent); border-bottom-right-radius: 4px; align-self: flex-end; margin-left: auto; }
    .chat-msgs { display: flex; flex-direction: column; padding: 10px 0; }

    /* PROGRESS RING */
    .progress-ring { position: relative; display: inline-flex; align-items: center; justify-content: center; }

    /* SCAN ZONE */
    .scan-zone {
      border: 2px dashed var(--border2); border-radius: var(--radius);
      padding: 32px 20px; text-align: center; cursor: pointer;
      transition: all 0.2s; background: var(--bg2);
    }
    .scan-zone:active { background: var(--bg3); border-color: var(--accent); }

    /* PRODUCT ROW */
    .product-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .product-row:last-child { border-bottom: none; }
    .product-name { font-size: 14px; font-weight: 500; flex: 1; }
    .product-price { font-family: var(--mono); font-size: 14px; color: var(--text2); }

    /* BALANCE CARD */
    .balance-main {
      background: linear-gradient(135deg, rgba(124,106,255,0.15), rgba(255,107,157,0.08));
      border: 1px solid rgba(124,106,255,0.2);
    }

    /* SPARKLINE placeholder */
    .sparkline { height: 40px; opacity: 0.6; }

    /* SWITCH */
    .switch { position: relative; width: 44px; height: 26px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch-slider {
      position: absolute; inset: 0; background: var(--bg4); border-radius: 13px; cursor: pointer;
      transition: 0.2s;
    }
    .switch-slider::before {
      content: ''; position: absolute; width: 20px; height: 20px; left: 3px; top: 3px;
      background: var(--text2); border-radius: 50%; transition: 0.2s;
    }
    .switch input:checked + .switch-slider { background: var(--accent); }
    .switch input:checked + .switch-slider::before { transform: translateX(18px); background: white; }

    /* EMPTY STATE */
    .empty { text-align: center; padding: 48px 20px; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
    .empty-title { font-size: 16px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
    .empty-sub { font-size: 13px; color: var(--text3); line-height: 1.5; }

    /* COLOR PICKER */
    .color-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.15s; }
    .color-swatch.selected { border-color: white; transform: scale(1.1); }

    /* CATEGORY CHIP */
    .cat-chip {
      display: flex; align-items: center; gap: 6px; padding: 8px 12px;
      background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
      font-size: 13px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .cat-chip.selected { background: rgba(124,106,255,0.15); border-color: var(--accent); color: var(--accent2); }

    /* SPLIT SLIDER */
    .split-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .split-pct { font-family: var(--mono); font-size: 14px; min-width: 36px; text-align: right; }

    /* PANTRY ITEM */
    .pantry-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .pantry-item:last-child { border-bottom: none; }
    .pantry-icon { font-size: 22px; width: 36px; text-align: center; }
    .pantry-days { font-family: var(--mono); font-size: 22px; font-weight: 300; color: var(--text); min-width: 36px; text-align: right; }
    .pantry-days.urgent { color: var(--red); }
    .pantry-days.soon { color: var(--amber); }
    .pantry-days.ok { color: var(--green); }

    /* HISTORY ITEM */
    .history-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .history-item:last-child { border-bottom: none; }

    /* STAT GRID */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; }
    .stat-value { font-size: 22px; font-weight: 600; font-family: var(--mono); letter-spacing: -0.5px; }
    .stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; letter-spacing: 0.3px; }

    /* FAB */
    .fab {
      position: fixed; bottom: calc(90px + var(--safe-bottom)); right: 20px;
      width: 54px; height: 54px; border-radius: 17px;
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 24px rgba(124,106,255,0.4); z-index: 50;
      font-size: 24px; transition: all 0.15s;
    }
    .fab:active { transform: scale(0.93); }

    /* TICKET ITEM IN LIST */
    .ticket-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
      cursor: pointer; transition: border-color 0.15s;
    }
    .ticket-card:active { border-color: var(--border2); }

    /* PROCESSING STATE */
    .processing { text-align: center; padding: 32px 20px; }
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--bg3);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* CHAT QUESTION CARD */
    .qa-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
    }
    .qa-question { font-size: 14px; line-height: 1.5; margin-bottom: 10px; }
    .qa-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .qa-btn {
      padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border2);
      background: var(--bg3); font-family: var(--font); font-size: 13px;
      color: var(--text); cursor: pointer; transition: all 0.15s;
    }
    .qa-btn:active { background: var(--accent); border-color: var(--accent); color: white; }

    /* PERCENTAGE INPUT */
    .pct-input { width: 60px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 6px 8px; color: var(--text); font-family: var(--mono); font-size: 14px; text-align: center; outline: none; }
    .pct-input:focus { border-color: var(--accent); }

    /* HEADER */
    .top-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-top: 4px; }

    /* STEPPER */
    .stepper { display: flex; align-items: center; gap: 6px; margin-bottom: 20px; }
    .step { width: 8px; height: 8px; border-radius: 50%; background: var(--bg4); transition: all 0.2s; }
    .step.active { background: var(--accent); width: 24px; border-radius: 4px; }
    .step.done { background: var(--green); }

    /* TICKET STEP */
    .ticket-step { animation: fadeSlide 0.2s ease; }
    @keyframes fadeSlide { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── STORAGE ────────────────────────────────────────────────────────────────
const S = {
  get: (k, def) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

// ─── INITIAL DATA ─────────────────────────────────────────────────────────
const COLORS = ['#7c6aff','#ff6b9d','#3dd68c','#ffb347','#60b3ff','#ff7c5c','#c084fc','#34d399'];
const CATS = ['🛒 Supermercado','🍽 Restaurante','🏠 Hogar','💡 Suministros','🚌 Transporte','💊 Salud','👗 Personal','🎮 Ocio','📱 Suscripciones','✈️ Viajes'];
const CAT_ICONS = {'🛒 Supermercado':'🛒','🍽 Restaurante':'🍽','🏠 Hogar':'🏠','💡 Suministros':'💡','🚌 Transporte':'🚌','💊 Salud':'💊','👗 Personal':'👗','🎮 Ocio':'🎮','📱 Suscripciones':'📱','✈️ Viajes':'✈️'};

const defaultPersonas = [
  { id: 'p1', nombre: 'Persona A', color: '#7c6aff', tarjetas: ['4821'] },
  { id: 'p2', nombre: 'Persona B', color: '#ff6b9d', tarjetas: ['1940'] },
];

// ─── HELPERS ────────────────────────────────────────────────────────────────
const fmt = (n) => `${parseFloat(n || 0).toFixed(2).replace('.', ',')} €`;
const fmtDate = (d) => new Date(d).toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric' });
const uid = () => Math.random().toString(36).substr(2,9);

// ─── CLAUDE API ──────────────────────────────────────────────────────────────
const callClaude = async (prompt, systemPrompt = '') => {
  const messages = [{ role: 'user', content: prompt }];
  const body = {
    model: 'claude-sonnet-4-20250514',
    max_tokens: 1000,
    messages,
  };
  if (systemPrompt) body.system = systemPrompt;
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  return data.content?.map(b => b.text || '').join('') || '';
};

// ─── OCR SIMULATION / AI PARSING ─────────────────────────────────────────────
const parseTicketWithAI = async (ocrText, personas, diccionario) => {
  const p1 = personas[0]?.nombre || 'Persona A';
  const p2 = personas[1]?.nombre || 'Persona B';
  const dictStr = Object.entries(diccionario).map(([k,v]) => `"${k}" → "${v.nombre}" (${v.persona})`).join('\n');
  
  const system = `Eres un analizador de tickets de supermercado. Responde SOLO con JSON válido, sin explicaciones.`;
  const prompt = `Analiza este texto de ticket y devuelve un JSON con esta estructura exacta:
{
  "supermercado": "nombre o null",
  "fecha": "YYYY-MM-DD o null",
  "total": número o null,
  "tarjeta": "últimos 4 dígitos o null",
  "productos": [
    {
      "id": "uid único",
      "nombreOCR": "texto original",
      "nombre": "nombre normalizado legible",
      "precio": número,
      "cantidad": número,
      "descuento": número o 0,
      "persona": "${p1 o p2 o 'común'}",
      "reparto": {"${p1}": 50, "${p2}": 50},
      "confianza": número 0-100,
      "esComun": booleano
    }
  ],
  "errores": ["lista de problemas detectados o vacío"],
  "confianzaGlobal": número 0-100
}

Diccionario aprendido (usar cuando coincida):
${dictStr || 'Vacío aún'}

Personas en la casa: ${p1} y ${p2}.

Heurísticas de asignación:
- yogures, proteínas, cosmética → probablemente personal
- papel higiénico, detergente, aceite, sal, leche, pan → común
- cerveza, vino → verificar con usuario
- si no sé → común por defecto

Texto del ticket:
${ocrText}`;

  const raw = await callClaude(prompt, system);
  try {
    const clean = raw.replace(/```json|```/g,'').trim();
    return JSON.parse(clean);
  } catch {
    return { errores: ['No se pudo analizar el ticket con IA'], productos: [], confianzaGlobal: 0 };
  }
};

const generateAIQuestions = async (ticket, personas, historial) => {
  const p1 = personas[0]?.nombre || 'Persona A';
  const p2 = personas[1]?.nombre || 'Persona B';
  const system = `Eres un asistente de aprendizaje doméstico. Responde SOLO con JSON.`;
  const prompt = `Basándote en este ticket procesado, genera preguntas de aprendizaje para mejorar la IA.
Devuelve JSON:
[
  {
    "id": "uid",
    "pregunta": "texto de la pregunta",
    "tipo": "persona|comun|porcentaje|tarjeta|categoria",
    "opciones": ["opción 1", "opción 2", "opción 3"],
    "contexto": "producto o concepto relacionado"
  }
]
Máximo 3 preguntas. Solo sobre elementos realmente ambiguos.
Ticket: ${JSON.stringify(ticket?.productos?.slice(0,5) || [])}
Personas: ${p1}, ${p2}`;
  const raw = await callClaude(prompt, system);
  try {
    const clean = raw.replace(/```json|```/g,'').trim();
    return JSON.parse(clean);
  } catch { return []; }
};

const predictPantry = async (historial, personas) => {
  const system = `Eres un asistente de despensa. Responde SOLO con JSON.`;
  const nombres = [...new Set(historial.flatMap(t => t.productos?.map(p=>p.nombre)||[]))].slice(0,20);
  const prompt = `Analiza este historial de compras y estima días restantes para cada producto.
Productos comprados: ${nombres.join(', ')}
Devuelve JSON:
[{"nombre": "producto", "emoji": "🥛", "diasRestantes": 5, "urgente": true}]
Máximo 8 productos más relevantes.`;
  const raw = await callClaude(prompt, system);
  try {
    const clean = raw.replace(/```json|```/g,'').trim();
    return JSON.parse(clean);
  } catch { return []; }
};

// ─── TOAST ───────────────────────────────────────────────────────────────────
function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2500); return () => clearTimeout(t); }, []);
  return <div className="toast">{msg}</div>;
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('dashboard');
  const [personas, setPersonas] = useState(() => S.get('clarito_personas', defaultPersonas));
  const [tickets, setTickets] = useState(() => S.get('clarito_tickets', []));
  const [gastos, setGastos] = useState(() => S.get('clarito_gastos', []));
  const [diccionario, setDiccionario] = useState(() => S.get('clarito_dict', {}));
  const [historialBalance, setHistorialBalance] = useState(() => S.get('clarito_balance_hist', []));
  const [preguntas, setPreguntas] = useState(() => S.get('clarito_qa', []));
  const [toast, setToast] = useState(null);
  const [modal, setModal] = useState(null); // { type, data }

  // Persist
  useEffect(() => S.set('clarito_personas', personas), [personas]);
  useEffect(() => S.set('clarito_tickets', tickets), [tickets]);
  useEffect(() => S.set('clarito_gastos', gastos), [gastos]);
  useEffect(() => S.set('clarito_dict', diccionario), [diccionario]);
  useEffect(() => S.set('clarito_balance_hist', historialBalance), [historialBalance]);
  useEffect(() => S.set('clarito_qa', preguntas), [preguntas]);

  const showToast = (msg) => { setToast(msg); };
  const closeModal = () => setModal(null);

  const addTicket = (t) => {
    setTickets(prev => [t, ...prev]);
    showToast('✓ Ticket guardado');
  };

  const addGasto = (g) => {
    setGastos(prev => [g, ...prev]);
    showToast('✓ Gasto añadido');
  };

  const updateDiccionario = (ocr, nombre, persona) => {
    setDiccionario(prev => ({ ...prev, [ocr]: { nombre, persona } }));
  };

  const addPregunta = (q) => {
    setPreguntas(prev => {
      const exists = prev.find(p => p.id === q.id);
      if (exists) return prev;
      const updated = [q, ...prev];
      S.set('clarito_qa', updated);
      return updated;
    });
  };

  const responderPregunta = (id, respuesta) => {
    setPreguntas(prev => prev.filter(p => p.id !== id));
    showToast('✓ Aprendido');
  };

  // Balance calculation
  const calcBalance = () => {
    const p1 = personas[0]; const p2 = personas[1];
    if (!p1 || !p2) return { debe: null, monto: 0 };
    let deuda = 0; // positivo = p2 debe a p1
    tickets.forEach(t => {
      const pagador = t.pagadoPor;
      (t.productos || []).forEach(prod => {
        const precio = (prod.precio || 0) - (prod.descuento || 0);
        const rep = prod.reparto || { [p1.nombre]: 50, [p2.nombre]: 50 };
        const pctP1 = (rep[p1.nombre] || 0) / 100;
        const pctP2 = (rep[p2.nombre] || 0) / 100;
        if (pagador === p1.id) {
          deuda += precio * pctP2;
        } else if (pagador === p2.id) {
          deuda -= precio * pctP1;
        }
      });
    });
    gastos.forEach(g => {
      const precio = g.importe || 0;
      const pctP1 = (g.reparto?.[p1.nombre] || 50) / 100;
      const pctP2 = (g.reparto?.[p2.nombre] || 50) / 100;
      if (g.pagadoPor === p1.id) {
        deuda += precio * pctP2;
      } else if (g.pagadoPor === p2.id) {
        deuda -= precio * pctP1;
      }
    });
    return { deuda, p1, p2 };
  };

  const preguntasPendientes = preguntas.length;

  return (
    <div className="app">
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
      {modal?.type === 'nuevo_ticket' && (
        <NuevoTicketModal
          personas={personas} diccionario={diccionario}
          onSave={(t) => { addTicket(t); closeModal(); }}
          onClose={closeModal}
          onLearn={updateDiccionario}
          onQuestion={addPregunta}
        />
      )}
      {modal?.type === 'nuevo_gasto' && (
        <NuevoGastoModal
          personas={personas}
          onSave={(g) => { addGasto(g); closeModal(); }}
          onClose={closeModal}
        />
      )}
      {modal?.type === 'ticket_detalle' && (
        <TicketDetalleModal
          ticket={modal.data} personas={personas}
          onClose={closeModal}
          onDelete={(id) => { setTickets(t => t.filter(x => x.id !== id)); closeModal(); showToast('Ticket eliminado'); }}
        />
      )}
      {modal?.type === 'config' && (
        <ConfigModal
          personas={personas}
          onSave={(p) => { setPersonas(p); closeModal(); showToast('✓ Configuración guardada'); }}
          onClose={closeModal}
        />
      )}
      {modal?.type === 'saldar' && (
        <SaldarModal
          balance={calcBalance()}
          onSave={(snap) => {
            setHistorialBalance(prev => [snap, ...prev]);
            setTickets([]); setGastos([]);
            closeModal(); showToast('✓ Cuentas saldadas');
          }}
          onClose={closeModal}
        />
      )}

      <div className="screen">
        <div className="screen-inner">
          {tab === 'dashboard' && <DashboardScreen personas={personas} tickets={tickets} gastos={gastos} balance={calcBalance()} onSaldar={() => setModal({type:'saldar'})} historialBalance={historialBalance} onConfig={() => setModal({type:'config'})} />}
          {tab === 'tickets' && <TicketsScreen tickets={tickets} personas={personas} onNuevo={() => setModal({type:'nuevo_ticket'})} onDetalle={(t) => setModal({type:'ticket_detalle', data:t})} />}
          {tab === 'gastos' && <GastosScreen gastos={gastos} personas={personas} onNuevo={() => setModal({type:'nuevo_gasto'})} />}
          {tab === 'despensa' && <DespensaScreen tickets={tickets} personas={personas} />}
          {tab === 'chat' && <ChatScreen preguntas={preguntas} onResponder={responderPregunta} personas={personas} tickets={tickets} />}
        </div>
      </div>

      <nav className="bottom-nav">
        {[
          { id:'dashboard', icon:'◈', label:'Inicio' },
          { id:'tickets', icon:'◉', label:'Tickets' },
          { id:'gastos', icon:'◎', label:'Gastos' },
          { id:'despensa', icon:'◍', label:'Despensa' },
          { id:'chat', icon:'◌', label:'Asistente', badge: preguntasPendientes > 0 },
        ].map(n => (
          <button key={n.id} className={`nav-btn ${tab===n.id?'active':''}`} onClick={() => setTab(n.id)}>
            <div className="nav-icon">
              <NavIcon id={n.id} active={tab===n.id} />
            </div>
            <span className="nav-label">{n.label}</span>
            {n.badge && <span className="nav-badge" />}
          </button>
        ))}
      </nav>
    </div>
  );
}

    chat: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>,

  return icons[id] || null;
}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────

  }, 0);

  const quien = deuda > 0 ? p2 : p1;

  const monto = Math.abs(deuda || 0);

  return (
    <>
      <div className="top-header">
        <div>

          <div style={{textAlign:'center',padding:'8px 0'}}>
            <div style={{fontSize:32,marginBottom:6}}>✓</div>
            <div style={{fontWeight:600,fontSize:18,color:'var(--green)'}}>Cuentas al día</div>
            <div style={{fontSize:13,color:'var(--text3)',marginTop:4}}>Ninguna deuda pendiente</div>
          </div>
        ) : (
          <>
            <div style={{fontSize:12,color:'var(--text3)',marginBottom:6,letterSpacing:'0.5px',textTransform:'uppercase',fontWeight:600}}>Balance actual</div>
            <div style={{marginBottom:4}}>
              <span className="amount amount-lg">{fmt(monto)}</span>
            </div>
            <div style={{fontSize:14,color:'var(--text2)'}}>
              <span style={{color:quien?.color||'var(--text)',fontWeight:600}}>{quien?.nombre}</span>

              <span style={{color:aQuien?.color||'var(--text)',fontWeight:600}}>{aQuien?.nombre}</span>
            </div>
            <button className="btn btn-secondary btn-sm" style={{marginTop:14,width:'100%'}} onClick={onSaldar}>
              Cuentas saldadas

      {/* Gasto total mes */}

        <div className="stat-card">
          <div className="stat-value amount">{fmt(totalGastoMes)}</div>
          <div className="stat-label">Gasto total</div>
        </div>
        <div className="stat-card">
          <div className="stat-value">{tickets.length + gastos.length}</div>
          <div className="stat-label">Transacciones</div>
        </div>
      </div>

      {/* Personas */}
      {p1 && p2 && (
        <div className="card" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,padding:14}}>
          {[p1,p2].map(p => {
            const total = tickets.filter(t=>t.pagadoPor===p.id).reduce((s,t)=>s+(t.total||(t.productos||[]).reduce((a,x)=>a+(x.precio||0)-(x.descuento||0),0)||0),0)
              + gastos.filter(g=>g.pagadoPor===p.id).reduce((s,g)=>s+(g.importe||0),0);
            return (
              <div key={p.id} style={{textAlign:'center'}}>
                <div style={{width:40,height:40,borderRadius:12,background:p.color+'22',border:`2px solid ${p.color}44`,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 8px',fontSize:16,fontWeight:700,color:p.color}}>

              </div>

      {/* Últimas transacciones */}

      <div style={{height:20}}/>
    </>
  );
}

// ─── DESPENSA SCREEN ──────────────────────────────────────────────────────────
function DespensaScreen({ tickets, personas }) {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(false);

  const generar = async () => {
    if (tickets.length === 0) return;
    setLoading(true);
    const result = await predictPantry(tickets.slice(0,10), personas);
    setItems(result);
    setLoading(false);
  };

  useEffect(() => { if (tickets.length > 0 && items.length === 0) generar(); }, [tickets.length]);

  return (
    <>
      <div className="top-header">
        <div>
          <h1 className="page-title">Despensa</h1>
          <p className="page-sub" style={{marginBottom:0}}>Estimación de stock</p>
        </div>
        <button className="btn btn-secondary btn-sm" onClick={generar} disabled={loading}>
          {loading ? '…' : '↻ Actualizar'}
        </button>
      </div>

      {loading && (
        <div className="processing">
          <div className="spinner" />
          <div style={{fontSize:14,color:'var(--text2)'}}>Analizando historial…</div>
        </div>
      )}

      {!loading && items.length === 0 && (
        <div className="empty">
          <div className="empty-icon">🏪</div>
          <div className="empty-title">Sin datos suficientes</div>
          <div className="empty-sub">Añade más tickets para que la IA estime tu despensa</div>
        </div>
      )}

      {!loading && items.length > 0 && (
        <>
          <div className="card" style={{marginBottom:12,padding:'12px 14px'}}>
            <div style={{fontSize:12,color:'var(--text3)',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.5px',fontWeight:600}}>Estimación IA · Días restantes</div>
            <div style={{fontSize:12,color:'var(--text3)'}}>Basado en tu historial de compras</div>
          </div>
          {items.map((item,i) => {
            const cls = item.diasRestantes <= 2 ? 'urgent' : item.diasRestantes <= 5 ? 'soon' : 'ok';
            return (
              <div key={i} className="pantry-item">
                <span className="pantry-icon">{item.emoji||'🛒'}</span>
                <div className="col" style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:500}}>{item.nombre}</div>
                  <div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>
                    {item.urgente ? '⚠️ Necesitas comprar pronto' : 'Stock estimado'}
                  </div>
                </div>
                <div>
                  <span className={`pantry-days ${cls}`}>{item.diasRestantes}</span>
                  <div style={{fontSize:10,color:'var(--text3)',textAlign:'right'}}>días</div>
                </div>
              </div>
            );
          })}
        </>
      )}
    </>
  );
}

// ─── CHAT/ASISTENTE ────────────────────────────────────────────────────────────
function ChatScreen({ preguntas, onResponder, personas, tickets }) {
  const [msgs, setMsgs] = useState([
    { id:'w', role:'ai', text:'Hola 👋 Soy tu asistente doméstico. Aquí aparecen mis preguntas para aprender mejor de vuestros hábitos.' }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const msgEnd = useRef(null);

  const scrollDown = () => msgEnd.current?.scrollIntoView({ behavior:'smooth' });
  useEffect(scrollDown, [msgs]);

  const sendMsg = async () => {
    if (!input.trim()) return;
    const userMsg = input.trim();
    setInput('');
    setMsgs(prev => [...prev, { id:uid(), role:'user', text:userMsg }]);
    setLoading(true);
    const p1 = personas[0]?.nombre||'Persona A'; const p2 = personas[1]?.nombre||'Persona B';
    const system = `Eres un asistente doméstico amigable para una app de gastos compartidos llamada Clarito. La casa tiene dos personas: ${p1} y ${p2}. Responde en español, de forma breve y útil. No uses markdown.`;
    const nTickets = tickets.length;
    const context = `Hay ${nTickets} tickets registrados. `;
    const resp = await callClaude(context + userMsg, system);
    setMsgs(prev => [...prev, { id:uid(), role:'ai', text:resp }]);
    setLoading(false);
  };

  return (
    <>
      <div className="top-header">
        <div>
          <h1 className="page-title">Asistente</h1>
          <p className="page-sub" style={{marginBottom:0}}>IA doméstica</p>
        </div>
        {preguntas.length > 0 && (
          <div className="tag tag-red">{preguntas.length} pendientes</div>
        )}
      </div>

      {/* Preguntas pendientes */}
      {preguntas.length > 0 && (
        <>
          <div className="section-title">Preguntas de aprendizaje</div>
          {preguntas.slice(0,5).map(q => (
            <div key={q.id} className="qa-card">
              <div className="qa-question">{q.pregunta}</div>
              <div className="qa-btns">
                {(q.opciones||[]).map((op,i) => (
                  <button key={i} className="qa-btn" onClick={() => onResponder(q.id, op)}>{op}</button>
                ))}
                <button className="qa-btn" style={{color:'var(--text3)'}} onClick={() => onResponder(q.id, 'omitir')}>Omitir</button>
              </div>
            </div>
          ))}
          <div className="divider" />
        </>
      )}

      {/* Chat libre */}
      <div className="section-title">Chat con el asistente</div>
      <div className="card" style={{padding:'10px 12px',marginBottom:12}}>
        <div className="chat-msgs">
          {msgs.map(m => (
            <div key={m.id} className={`chat-bubble ${m.role==='ai'?'chat-ai':'chat-user'}`}>
              {m.text}
            </div>
          ))}
          {loading && (
            <div className="chat-bubble chat-ai" style={{color:'var(--text3)'}}>
              <span style={{animation:'pulse 1s infinite'}}>Escribiendo…</span>
            </div>
          )}
          <div ref={msgEnd} />
        </div>
      </div>

      {/* Input */}
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        <input
          className="input" style={{flex:1}}
          placeholder="Pregunta algo…"
          value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&sendMsg()}
        />
        <button className="btn btn-primary btn-sm" style={{width:'auto',paddingLeft:18,paddingRight:18}} onClick={sendMsg} disabled={loading}>
          →
        </button>
      </div>

      <div style={{fontSize:12,color:'var(--text3)',textAlign:'center',paddingBottom:8}}>
        Pregunta sobre gastos, hábitos, previsiones…
      </div>
    </>
  );
}

// ─── NUEVO TICKET MODAL ────────────────────────────────────────────────────────
function NuevoTicketModal({ personas, diccionario, onSave, onClose, onLearn, onQuestion }) {
  const [step, setStep] = useState(0); // 0: origen, 1: procesando, 2: revisar
  const [ocrText, setOcrText] = useState('');
  const [parsed, setParsed] = useState(null);
  const [errores, setErrores] = useState([]);
  const [pagador, setPagador] = useState(personas[0]?.id || '');
  const [loading, setLoading] = useState(false);
  const [manualMode, setManualMode] = useState(false);
  const fileRef = useRef(null);

  const processText = async (text) => {
    setStep(1); setLoading(true);
    const result = await parseTicketWithAI(text, personas, diccionario);
    setParsed(result);
    setErrores(result.errores || []);
    // Detectar tarjeta
    if (result.tarjeta) {
      const ownerCard = personas.find(p => p.tarjetas?.includes(result.tarjeta));
      if (ownerCard) setPagador(ownerCard.id);
    }
    setLoading(false); setStep(2);
    // Generar preguntas de aprendizaje
    const qs = await generateAIQuestions(result, personas, []);
    qs.forEach(q => onQuestion({ ...q, id: uid() }));
  };

  const handleFile = (file) => {
    const reader = new FileReader();
    reader.onload = () => {
      // Simular OCR: en producción usarías Google Cloud Vision
      const fakeOCR = `MERCADONA S.A.\nFECHA: ${new Date().toLocaleDateString('es-ES')}\n` +
        `LECHE DESNAT 1L 1 0.89\nPAN MOLDE 0.63\nYOGURES X4 PROT 1.49\nDETERGENTE 1.5L 2.89\n` +
        `ACEITE OLIVA 0.75L 3.79\nRO DE MAR 1KG 0.49\nCERVEZA 6PAK 3.49\n` +
        `PAPEL HIGI 12R 3.29\nHUEVOS M 12U 2.15\nTOMATE FRIT 0.95\n` +
        `TOTAL 21.06\nTARJETA **** **** **** ${personas[0]?.tarjetas?.[0]||'4821'}\nGRACIAS POR SU VISITA`;
      setOcrText(fakeOCR);
      processText(fakeOCR);
    };
    reader.readAsDataURL(file);
  };

  const saveTicket = () => {
    const total = parsed?.total || (parsed?.productos||[]).reduce((s,p)=>s+(p.precio||0)-(p.descuento||0),0);
    const ticket = {
      id: uid(),
      fecha: parsed?.fecha || new Date().toISOString().split('T')[0],
      supermercado: parsed?.supermercado || 'Supermercado',
      total,
      tarjeta: parsed?.tarjeta,
      pagadoPor: pagador,
      productos: parsed?.productos || [],
      confianza: parsed?.confianzaGlobal || 0,
      ocrOriginal: ocrText,
    };
    // Aprender OCR→nombre
    (parsed?.productos||[]).forEach(p => {
      if (p.nombreOCR && p.nombreOCR !== p.nombre) {
        onLearn(p.nombreOCR, p.nombre, p.persona);
      }
    });
    onSave(ticket);
  };

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-handle" />
        
        {/* Stepper */}
        <div className="stepper">
          {['Origen','Procesando','Revisar'].map((s,i) => (
            <div key={i} className={`step ${step===i?'active':step>i?'done':''}`} />
          ))}
          <span style={{fontSize:12,color:'var(--text3)',marginLeft:6}}>
            {['Subir ticket','Analizando con IA…','Revisar y guardar'][step]}
          </span>
        </div>

        {step === 0 && (
          <div className="ticket-step">
            <div className="modal-title">Nuevo ticket</div>

            <div className="scan-zone" onClick={() => fileRef.current?.click()}>
              <div style={{fontSize:40,marginBottom:10}}>📷</div>
              <div style={{fontWeight:600,marginBottom:4}}>Subir foto del ticket</div>
              <div style={{fontSize:13,color:'var(--text3)'}}>Foto, galería o PDF</div>
              <input ref={fileRef} type="file" accept="image/*,application/pdf" capture="environment" style={{display:'none'}} onChange={e=>e.target.files[0]&&handleFile(e.target.files[0])} />
            </div>

            <div className="row" style={{margin:'14px 0',gap:8}}>
              <div className="divider" style={{flex:1,margin:0}} />
              <span style={{fontSize:13,color:'var(--text3)'}}>o introduce manualmente</span>
              <div className="divider" style={{flex:1,margin:0}} />
            </div>

            <button className="btn btn-secondary" style={{width:'100%',marginBottom:12}} onClick={()=>setManualMode(true)}>
              ✏️ Introducir texto del ticket
            </button>

            {manualMode && (
              <>
                <div className="input-group">
                  <label className="input-label">Texto del ticket (OCR manual)</label>
                  <textarea className="input" rows={6} placeholder="Pega o escribe el contenido del ticket…" value={ocrText} onChange={e=>setOcrText(e.target.value)} style={{resize:'vertical'}} />
                </div>
                <button className="btn btn-primary" onClick={() => ocrText.trim() && processText(ocrText)} disabled={!ocrText.trim()}>
                  Analizar con IA →
                </button>
              </>
            )}

            <div className="divider" />
            <ManualTicketForm personas={personas} onSave={onSave} onClose={onClose} />
          </div>
        )}

        {step === 1 && (
          <div className="processing">
            <div className="spinner" />
            <div style={{fontSize:16,fontWeight:500,marginBottom:8}}>Analizando ticket…</div>
            <div style={{fontSize:13,color:'var(--text3)'}}>La IA está procesando los productos</div>
          </div>
        )}

        {step === 2 && parsed && (
          <div className="ticket-step">
            <div className="row" style={{marginBottom:16}}>
              <div className="modal-title" style={{margin:0}}>Revisar ticket</div>
              <div style={{display:'flex',gap:6}}>
                <div className="tag" style={{background: parsed.confianzaGlobal>70?'rgba(61,214,140,0.12)':'rgba(255,179,71,0.12)', color:parsed.confianzaGlobal>70?'var(--green)':'var(--amber)'}}>
                  {parsed.confianzaGlobal}% confianza
                </div>
              </div>
            </div>

            {/* Errores */}
            {errores.length > 0 && (
              <div style={{background:'rgba(255,179,71,0.08)',border:'1px solid rgba(255,179,71,0.2)',borderRadius:10,padding:12,marginBottom:14}}>
                {errores.map((e,i) => <div key={i} style={{fontSize:13,color:'var(--amber)',marginBottom:i<errores.length-1?4:0}}>⚠ {e}</div>)}
                <button className="btn btn-ghost btn-sm" style={{marginTop:4,color:'var(--text3)'}}>Obviar errores y continuar</button>
              </div>
            )}

            {/* Info básica */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
              <div className="input-group" style={{margin:0}}>
                <label className="input-label">Supermercado</label>
                <input className="input" value={parsed.supermercado||''} onChange={e=>setParsed(p=>({...p,supermercado:e.target.value}))} placeholder="Detectar…" />
              </div>
              <div className="input-group" style={{margin:0}}>
                <label className="input-label">Fecha</label>
                <input className="input" type="date" value={parsed.fecha||''} onChange={e=>setParsed(p=>({...p,fecha:e.target.value}))} />
              </div>
            </div>

            {/* Tarjeta y pagador */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
              <div className="input-group" style={{margin:0}}>
                <label className="input-label">Tarjeta detectada</label>
                <input className="input" value={parsed.tarjeta||''} onChange={e=>setParsed(p=>({...p,tarjeta:e.target.value}))} placeholder="Últimos 4" maxLength={4} style={{fontFamily:'var(--mono)'}} />
              </div>
              <div className="input-group" style={{margin:0}}>
                <label className="input-label">¿Quién pagó?</label>
                <select className="input" value={pagador} onChange={e=>setPagador(e.target.value)}>
                  {personas.map(p => <option key={p.id} value={p.id}>{p.nombre}</option>)}
                </select>
              </div>
            </div>

            {/* Productos */}
            <div className="section-title" style={{marginTop:8}}>Productos ({parsed.productos?.length||0})</div>
            <div className="card" style={{padding:'4px 12px'}}>
              {(parsed.productos||[]).map((prod,i) => (
                <ProductoRow key={prod.id||i} prod={prod} personas={personas}
                  onChange={(updated) => setParsed(p => ({...p, productos: p.productos.map((x,xi)=>xi===i?updated:x)}))}
                />
              ))}
            </div>

            {/* Total */}
            <div className="row" style={{padding:'12px 0'}}>
              <span style={{fontWeight:600}}>Total</span>
              <span className="amount" style={{fontSize:20,fontWeight:600}}>{fmt(parsed.total||(parsed.productos||[]).reduce((s,p)=>s+(p.precio||0)-(p.descuento||0),0))}</span>
            </div>

            <button className="btn btn-primary" onClick={saveTicket}>Guardar ticket ✓</button>
          </div>
        )}
      </div>
    </div>
  );
}

              onClick={()=>onChange({...prod,persona:p2?.nombre,esComun:false,reparto:{[p1?.nombre]:0,[p2?.nombre]:100}})}>

        </div>

        <div className="input-group">
          <label className="input-label">Categoría</label>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {CATS.map(c => (
              <button key={c} className={`cat-chip ${categoria===c?'selected':''}`} onClick={()=>setCategoria(c)}>
                {c.split(' ')[0]} {c.split(' ').slice(1).join(' ')}
              </button>
            ))}
          </div>
        </div>

        <div className="input-group">
          <label className="input-label">Reparto</label>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:13,color:p1?.color,fontWeight:500,minWidth:70}}>{p1?.nombre}</span>
            <input type="range" min={0} max={100} value={p1pct} onChange={e=>setP1pct(parseInt(e.target.value))}
              style={{flex:1,accentColor:'var(--accent)'}} />
            <span style={{fontSize:13,color:p2?.color,fontWeight:500,minWidth:70,textAlign:'right'}}>{p2?.nombre}</span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'var(--text3)',marginTop:4}}>
            <span className="amount">{p1pct}%</span>
            <span className="amount">{100-p1pct}%</span>
          </div>
        </div>

        <button className="btn btn-primary" onClick={save} disabled={!importe}>Guardar gasto ✓</button>
      </div>
    </div>
  );
}

// ─── TICKET DETALLE MODAL ─────────────────────────────────────────────────────
function TicketDetalleModal({ ticket, personas, onClose, onDelete }) {
  const pag = personas.find(p=>p.id===ticket.pagadoPor);
  const total = ticket.total || (ticket.productos||[]).reduce((s,p)=>s+(p.precio||0)-(p.descuento||0),0);
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-handle" />
        <div className="row" style={{marginBottom:16}}>
          <div className="modal-title" style={{margin:0}}>{ticket.supermercado||'Ticket'}</div>
          {pag && <div className="person-pill" style={{background:pag.color+'22',color:pag.color}}><span className="person-dot" style={{background:pag.color}}/>{pag.nombre}</div>}
        </div>

        <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
          <div className="tag tag-gray">{fmtDate(ticket.fecha||new Date())}</div>
          {ticket.tarjeta && <div className="tag tag-gray" style={{fontFamily:'var(--mono)'}}>•••• {ticket.tarjeta}</div>}
          <div className={`tag ${ticket.confianza>70?'tag-green':'tag-amber'}`}>{ticket.confianza}% IA</div>
        </div>

        <div className="section-title">Productos</div>
        <div className="card" style={{padding:'4px 12px',marginBottom:14}}>
          {(ticket.productos||[]).map((prod,i) => {
            const persona = personas.find(p=>p.nombre===prod.persona);
            const netPrice = (prod.precio||0) - (prod.descuento||0);
            return (
              <div key={i} className="product-row">
                <div style={{width:4,height:32,borderRadius:2,background:prod.esComun?'linear-gradient(to bottom,var(--p1),var(--p2))':persona?.color||'var(--bg4)',flexShrink:0}} />
                <div style={{flex:1}}>
                  <div style={{fontSize:14}}>{prod.nombre}</div>
                  {prod.esComun && <div style={{fontSize:11,color:'var(--text3)'}}>Común {prod.reparto?.[personas[0]?.nombre]||50}/{prod.reparto?.[personas[1]?.nombre]||50}%</div>}
                  {!prod.esComun && persona && <div style={{fontSize:11,color:persona.color}}>{persona.nombre}</div>}
                </div>
                <div style={{textAlign:'right'}}>
                  <div className="product-price">{fmt(netPrice)}</div>
                  {prod.descuento>0 && <div style={{fontSize:11,color:'var(--green)'}}>-{fmt(prod.descuento)}</div>}
                </div>
              </div>
            );
          })}
        </div>

        <div className="row" style={{padding:'8px 0',marginBottom:16}}>
          <span style={{fontWeight:600}}>Total</span>
          <span className="amount" style={{fontSize:20,fontWeight:600}}>{fmt(total)}</span>
        </div>

        <button className="btn btn-danger" style={{width:'100%'}} onClick={()=>onDelete(ticket.id)}>
          Eliminar ticket
        </button>
      </div>
    </div>
  );
}

// ─── SALDAR MODAL ──────────────────────────────────────────────────────────────
function SaldarModal({ balance, onSave, onClose }) {
  const { deuda, p1, p2 } = balance;
  const monto = Math.abs(deuda||0);
  const quien = deuda > 0 ? p2 : p1;
  const aQuien = deuda > 0 ? p1 : p2;
  const now = new Date();

  const save = () => {
    onSave({
      label: `Cuentas saldadas · ${now.toLocaleDateString('es-ES',{day:'2-digit',month:'long',year:'numeric'})}`,
      total: monto, deuda, fecha: now.toISOString(), ntx: 0,
    });
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-handle" />
        <div className="modal-title">Saldar cuentas</div>

        <div className="card" style={{textAlign:'center',padding:'24px 16px',marginBottom:16}}>
          <div style={{fontSize:12,color:'var(--text3)',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.5px',fontWeight:600}}>Deuda pendiente</div>
          {monto < 0.01 ? (
            <div style={{fontSize:18,fontWeight:600,color:'var(--green)'}}>¡Sin deuda! Cuentas equilibradas</div>
          ) : (
            <>
              <div className="amount amount-lg" style={{marginBottom:8}}>{fmt(monto)}</div>
              <div style={{fontSize:14,color:'var(--text2)'}}>
                <span style={{color:quien?.color,fontWeight:600}}>{quien?.nombre}</span>{' paga a '}
                <span style={{color:aQuien?.color,fontWeight:600}}>{aQuien?.nombre}</span>
              </div>
            </>
          )}
        </div>

        <div style={{background:'rgba(255,179,71,0.08)',border:'1px solid rgba(255,179,71,0.15)',borderRadius:10,padding:12,marginBottom:16}}>
          <div style={{fontSize:13,color:'var(--amber)',lineHeight:1.5}}>
            ⚠ Esto archivará todas las transacciones actuales y reiniciará el ciclo. El historial se conservará.
          </div>
        </div>

        <button className="btn btn-primary" onClick={save}>Confirmar · Cuentas saldadas ✓</button>
        <button className="btn btn-ghost" style={{width:'100%',marginTop:8}} onClick={onClose}>Cancelar</button>
      </div>
    </div>
  );
}

// ─── CONFIG MODAL ──────────────────────────────────────────────────────────────
function ConfigModal({ personas, onSave, onClose }) {
  const [ps, setPs] = useState(personas.map(p=>({...p,tarjetas:[...p.tarjetas]})));
  const [newCard, setNewCard] = useState(['','']);

  const updateP = (i, field, val) => setPs(prev => prev.map((p,pi) => pi===i ? {...p,[field]:val} : p));

  const addCard = (i) => {
    if (!newCard[i]) return;
    setPs(prev => prev.map((p,pi) => pi===i ? {...p,tarjetas:[...p.tarjetas,newCard[i]]} : p));
    setNewCard(prev => { const n=[...prev]; n[i]=''; return n; });
  };

  const removeCard = (pi, card) => setPs(prev => prev.map((p,i) => i===pi ? {...p,tarjetas:p.tarjetas.filter(c=>c!==card)} : p));

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-handle" />
        <div className="modal-title">Configuración</div>

        {ps.map((p,i) => (
          <div key={p.id} className="card" style={{marginBottom:14}}>
            <div style={{marginBottom:12,fontWeight:600,fontSize:15}}>Persona {i+1}</div>

            <div className="input-group">
              <label className="input-label">Nombre</label>
              <input className="input" value={p.nombre} onChange={e=>updateP(i,'nombre',e.target.value)} />
            </div>

            <div className="input-group">
              <label className="input-label">Color</label>
              <div style={{display:'flex',gap:10,flexWrap:'wrap',marginTop:4}}>
                {COLORS.map(c => (
                  <div key={c} className={`color-swatch ${p.color===c?'selected':''}`} style={{background:c}} onClick={()=>updateP(i,'color',c)} />
                ))}
              </div>
            </div>

            <div className="input-group" style={{marginBottom:0}}>
              <label className="input-label">Tarjetas (últimos 4 dígitos)</label>
              <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:8}}>
                {p.tarjetas.map(c => (
                  <div key={c} style={{display:'flex',alignItems:'center',gap:6,background:'var(--bg3)',borderRadius:8,padding:'4px 10px',fontSize:13,fontFamily:'var(--mono)'}}>
                    •••• {c}
                    <button style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:14,padding:0}} onClick={()=>removeCard(i,c)}>✕</button>
                  </div>
                ))}
              </div>
              <div style={{display:'flex',gap:8}}>
                <input className="input" maxLength={4} placeholder="4821" value={newCard[i]} onChange={e=>setNewCard(prev=>{const n=[...prev];n[i]=e.target.value;return n;})} style={{fontFamily:'var(--mono)',flex:1}} />
                <button className="btn btn-secondary btn-sm" onClick={()=>addCard(i)}>+ Añadir</button>
              </div>
            </div>
          </div>
        ))}

        <button className="btn btn-primary" onClick={()=>onSave(ps)}>Guardar configuración ✓</button>
      </div>
    </div>
  );
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
