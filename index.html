<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Clarito"/>
  <meta name="theme-color" content="#0a0a0c"/>
  <link rel="manifest" href="/public/manifest.json"/>
  <link rel="apple-touch-icon" href="/public/icon-192.png"/>
  <title>Clarito</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #0a0a0c;
      --surface: #111116;
      --surface2: #18181f;
      --border: #1f1f2e;
      --border2: #2a2a3a;
      --text: #e8e8f0;
      --muted: #6b6b85;
      --dim: #3a3a50;
      --accent: #6c63ff;
      --accent-glow: rgba(108,99,255,0.15);
      --danger: #ff4d6d;
      --danger-glow: rgba(255,77,109,0.12);
      --success: #00d68f;
      --success-glow: rgba(0,214,143,0.10);
      --warn: #ffb347;
      --warn-glow: rgba(255,179,71,0.10);
      --safe: env(safe-area-inset-bottom, 0px);
    }

    *,*::before,*::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,body {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      overflow: hidden;
    }

    #root {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .page {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 0 18px 16px;
    }

    ::-webkit-scrollbar {
      width: 3px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    /* inputs */
    input, textarea, select {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      outline: none;
      width: 100%;
      transition: border-color .2s;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
    }

    input::placeholder, textarea::placeholder {
      color: var(--dim);
    }

    select option {
      background: var(--surface);
    }

    input[type=range] {
      background: none;
      border: none;
      padding: 4px 0;
      accent-color: var(--accent);
    }

    input[type=color] {
      padding: 3px;
      cursor: pointer;
      height: 42px;
      border-radius: 10px;
    }

    input[type=date]::-webkit-calendar-picker-indicator {
      filter: invert(0.6);
      cursor: pointer;
    }

    /* buttons */
    button {
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border: none;
      outline: none;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 12px 18px;
      border-radius: 12px;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:active {
      opacity: .85;
      transform: scale(.98);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:active {
      background: var(--surface2);
    }

    .btn-danger {
      background: var(--danger-glow);
      color: var(--danger);
      border: 1px solid rgba(255,77,109,.25);
    }

    .btn-success {
      background: var(--success-glow);
      color: var(--success);
      border: 1px solid rgba(0,214,143,.25);
    }

    .btn-sm {
      padding: 8px 14px;
      font-size: 13px;
      border-radius: 10px;
    }

    /* cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
    }

    .card-sm {
      background: var(--surface2);
      border-radius: 12px;
      padding: 13px;
    }

    /* tags */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }

    .tag-warn {
      background: var(--warn-glow);
      color: var(--warn);
    }

    .tag-danger {
      background: var(--danger-glow);
      color: var(--danger);
    }

    .tag-ok {
      background: var(--success-glow);
      color: var(--success);
    }

    .tag-accent {
      background: var(--accent-glow);
      color: var(--accent);
    }

    /* layout helpers */
    .row { display: flex; align-items: center; }
    .row-sb { display: flex; align-items: center; justify-content: space-between; }
    .col { display: flex; flex-direction: column; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .divider { height: 1px; background: var(--border); margin: 14px 0; }
    .mono { font-family: 'DM Mono', monospace; }
    .muted { color: var(--muted); }
    .small { font-size: 12px; }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .gap8 { gap: 8px; }
    .gap10 { gap: 10px; }
    .gap12 { gap: 12px; }

    .mb8 { margin-bottom: 8px; }
    .mb12 { margin-bottom: 12px; }
    .mb16 { margin-bottom: 16px; }
    .mb20 { margin-bottom: 20px; }

    .mt8 { margin-top: 8px; }
    .mt12 { margin-top: 12px; }
    .mt16 { margin-top: 16px; }

    .w100 { width: 100%; }
    .text-center { text-align: center; }

    /* person chip */
    .pchip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all .15s;
      background: none;
    }

    .pchip.sel {
      border-color: currentColor;
    }

    .pchip:not(.sel) {
      opacity: .38;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-sm {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* owner selector */
    .owner-btn {
      flex: 1;
      padding: 7px 4px;
      border-radius: 9px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      text-align: center;
    }

    .owner-btn.sel {
      background: color-mix(in srgb, var(--sel-color) 18%, transparent);
      border-color: var(--sel-color);
      color: var(--sel-color);
    }

    /* nav */
    .nav {
      display: flex;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding-bottom: calc(8px + var(--safe));
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 9px 2px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      position: relative;
      transition: color .2s;
    }

    .nav-btn.active {
      color: var(--accent);
    }

    .nav-btn.active::before {
      content: '';
      position: absolute;
      top: 0;
      left: 30%;
      right: 30%;
      height: 2px;
      background: var(--accent);
      border-radius: 0 0 2px 2px;
    }

    /* modal */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 200;
      animation: fadeIn .2s;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px 22px 0 0;
      padding: 20px 18px calc(28px + var(--safe));
      width: 100%;
      max-width: 500px;
      max-height: 93vh;
      overflow-y: auto;
      animation: slideUp .3s ease;
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    /* progress bar */
    .prog {
      height: 5px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
    }

    .prog-fill {
      height: 100%;
      border-radius: 3px;
      transition: width .6s ease;
    }

    /* spinner */
    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    /* error banner */
    .err-banner {
      background: var(--danger-glow);
      border: 1px solid rgba(255,77,109,.25);
      border-radius: 10px;
      padding: 11px 13px;
      color: var(--danger);
      font-size: 13px;
      margin-bottom: 8px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    /* header */
    .header {
      padding: calc(env(safe-area-inset-top,0px) + 18px) 18px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    /* floating AI */
    .fab {
      position: fixed;
      bottom: calc(76px + var(--safe));
      right: 18px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 100;
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
      transition: all .2s;
    }

    .fab:active {
      transform: scale(.93);
    }

    .fab.has-q {
      border-color: var(--danger);
      box-shadow: 0 0 0 2px rgba(255,77,109,.2),0 4px 24px rgba(0,0,0,.5);
    }

    .badge {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--danger);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* tabs */
    .tab-pills {
      display: flex;
      gap: 5px;
      background: var(--surface2);
      border-radius: 12px;
      padding: 4px;
    }

    .tab-pill {
      flex: 1;
      padding: 8px;
      border-radius: 9px;
      background: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      transition: all .15s;
      cursor: pointer;
      border: none;
    }

    .tab-pill.active {
      background: var(--surface);
      color: var(--text);
    }

    /* bar chart */
    .bars {
      display: flex;
      gap: 5px;
      align-items: flex-end;
      height: 72px;
    }

    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .bar-fill {
      width: 100%;
      border-radius: 4px 4px 0 0;
      min-height: 3px;
    }

    .bar-lbl {
      font-size: 9px;
      color: var(--muted);
    }

    /* animations */
    @keyframes fadeIn { from {opacity:0} to {opacity:1} }
    @keyframes slideUp { from {opacity:0; transform:translateY(24px)} to {opacity:1; transform:translateY(0)} }
    @keyframes spin { to {transform:rotate(360deg)} }
    @keyframes pulse { 0%,100% {opacity:1} 50% {opacity:.4} }

    .fade { animation: fadeIn .25s ease; }

    /* empty states */
    .empty {
      text-align: center;
      padding: 44px 20px;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 38px;
      margin-bottom: 12px;
    }

    .empty-title {
      font-weight: 500;
      font-size: 15px;
      color: var(--text);
      margin-bottom: 5px;
    }

    /* onboarding */
    .onboard {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }
  </style>
</head>

<body>
<button id="aiKeyBtn" class="fab" style="right: 78px;">🔑</button>
  <div id="root"></div>

  <script>
    // ─── STATE ────────────────────────────────────────────────────────────────
    const STORE_KEY = 'clarito_v2';

    function loadState() {
      try {
        const raw = localStorage.getItem(STORE_KEY);
        if (raw) return JSON.parse(raw);
      } catch {}
      return null;
    }

    function saveState(s) {
      try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch {}
    }

    const DEFAULT_STATE = {
      configured: false,
      people: [
        { id: 'A', name: '', color: '#6c63ff', cards: [] },
        { id: 'B', name: '', color: '#ff6b9d', cards: [] }
      ],
      tickets: [],
      expenses: [],
      aiQuestions: [],
      chatMessages: [{ role: 'ai', text: '¡Hola! Soy Clarito, tu asistente doméstico. Haré preguntas para aprender vuestros hábitos y ahorraros trabajo.' }],
      settled: []
    };

    let S = { ...DEFAULT_STATE, ...(loadState() || {}) };

    ['tickets','expenses','aiQuestions','chatMessages','settled'].forEach(k => {
      if (!Array.isArray(S[k])) S[k] = DEFAULT_STATE[k];
    });

    if (!S.people || S.people.length < 2) S.people = DEFAULT_STATE.people;

    function save() { saveState(S); }
		
		const GEMINI_KEY_STORE = 'clarito_gemini_key';

function getApiKey() {
  return localStorage.getItem(GEMINI_KEY_STORE) || '';
}

function setApiKey(key) {
  localStorage.setItem(GEMINI_KEY_STORE, key);
}
    // ─── HELPERS ──────────────────────────────────────────────────────────────
    const uid = () => Math.random().toString(36).slice(2,9);
    const today = () => new Date().toISOString().split('T')[0];
    const fmt = n => new Intl.NumberFormat('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0)+'€';
    const pA = () => S.people[0];
    const pB = () => S.people[1];
    const personById = id => S.people.find(p=>p.id===id);
    const pendingQ = () => S.aiQuestions.filter(q=>!q.answered);

    // ─── AI CALL ──────────────────────────────────────────────────────────────
    async function callAI(prompt, apiKey) {
  const res = await fetch(
    "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + apiKey,
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        contents: [
          {
            parts: [{ text: prompt }]
          }
        ]
      })
    }
  );

  const data = await res.json();

  if (!res.ok) {
    throw new Error(data?.error?.message || "Error IA");
  }

  return data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
}

    // ─── BALANCE ───────────────────────────────────────────────────────────────
    function computeBalance() {
      let owedAtoB = 0, owedBtoA = 0;

      S.tickets.forEach(t => {
        t.products.forEach(p => {
          const price = parseFloat(p.price) || 0;

          let shareA = 0, shareB = 0;
          if (p.owner === 'A') shareA = price;
          else if (p.owner === 'B') shareB = price;
          else {
            shareA = price * ((p.splitA ?? 50) / 100);
            shareB = price * ((p.splitB ?? 50) / 100);
          }

          if (t.paidBy === 'A') owedBtoA += shareB;
          else owedAtoB += shareA;
        });
      });

      S.expenses.forEach(e => {
        const amt = parseFloat(e.amount) || 0;
        const shareA = amt * ((e.splitA ?? 50) / 100);
        const shareB = amt * ((e.splitB ?? 50) / 100);

        if (e.paidBy === 'A') owedBtoA += shareB;
        else owedAtoB += shareA;
      });

      const net = owedBtoA - owedAtoB;

      return {
        bOwesA: Math.max(0, net),
        aOwesB: Math.max(0, -net)
      };
    }

    function totalPaid(personId) {
      const t = S.tickets.filter(t => t.paidBy === personId)
        .reduce((s,t) => s + (parseFloat(t.total) || 0), 0);

      const e = S.expenses.filter(e => e.paidBy === personId)
        .reduce((s,e) => s + (parseFloat(e.amount) || 0), 0);

      return t + e;
    }
document.getElementById('aiKeyBtn').addEventListener('click', () => {
  const current = getApiKey();
  const key = prompt('Introduce tu API Key de Gemini', current || '');
  if (key !== null) {
    setApiKey(key.trim());
    alert('API Key guardada');
  }
});

  </script>
</body>
</html>
