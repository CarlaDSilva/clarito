<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Clarito"/>
<meta name="theme-color" content="#0d0d0f"/>
<title>Clarito</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg0:#0d0d0f;--bg1:#141417;--bg2:#1c1c21;--bg3:#242429;--bg4:#2e2e35;
  --txt0:#f0f0f2;--txt1:#b8b8c2;--txt2:#737380;--txt3:#45454f;
  --brd:#2a2a32;
  --rad:14px;--rad-sm:8px;--rad-xs:5px;
  --accent:#7c6ef5;--accent2:#5a4fd4;
  --green:#3ecf8e;--red:#e5534b;--amber:#f59e0b;--blue:#4a9eff;
}
html,body{height:100%;background:var(--bg0);color:var(--txt0);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;overflow:hidden}
button{background:none;border:none;cursor:pointer;color:inherit;font-family:inherit}
input,textarea,select{font-family:inherit;background:var(--bg3);color:var(--txt0);border:1px solid var(--brd);border-radius:var(--rad-sm);padding:10px 14px;font-size:15px;outline:none;width:100%}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

/* ── LAYOUT ── */
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}
#view{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:80px}

/* ── BOTTOM NAV ── */
#nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  background:rgba(20,20,23,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--brd);
  display:flex;justify-content:space-around;align-items:center;
  padding:8px 0 max(8px,env(safe-area-inset-bottom));
  z-index:100;
}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 12px;border-radius:var(--rad-sm);transition:.2s}
.nav-btn svg{width:24px;height:24px;stroke-width:1.7}
.nav-btn span{font-size:10px;color:var(--txt2)}
.nav-btn.active svg{stroke:var(--accent)}
.nav-btn.active span{color:var(--accent)}
.nav-btn svg{stroke:var(--txt2)}

/* ── SCREEN HEADER ── */
.screen-header{
  position:sticky;top:0;z-index:50;
  background:rgba(13,13,15,0.88);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  padding:52px 20px 14px;
  border-bottom:1px solid var(--brd);
}
.screen-header h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
.screen-header p{font-size:13px;color:var(--txt2);margin-top:3px}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rad);padding:16px;margin:0 16px 12px}
.card-sm{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rad-sm);padding:12px 14px}

/* ── BUTTON STYLES ── */
.btn-primary{background:var(--accent);color:#fff;border-radius:var(--rad-sm);padding:12px 20px;font-size:15px;font-weight:600;width:100%;text-align:center;transition:.15s}
.btn-primary:active{opacity:.8;transform:scale(.98)}
.btn-secondary{background:var(--bg3);color:var(--txt0);border:1px solid var(--brd);border-radius:var(--rad-sm);padding:11px 18px;font-size:14px;font-weight:500;transition:.15s}
.btn-secondary:active{opacity:.75}
.btn-danger{background:rgba(229,83,75,.15);color:var(--red);border:1px solid rgba(229,83,75,.3);border-radius:var(--rad-sm);padding:11px 18px;font-size:14px;font-weight:500}
.btn-ghost{color:var(--txt1);font-size:14px;padding:8px 12px;border-radius:var(--rad-xs);transition:.15s}
.btn-ghost:active{background:var(--bg3)}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-red{background:rgba(229,83,75,.18);color:#ff6b65}
.badge-green{background:rgba(62,207,142,.15);color:#3ecf8e}
.badge-amber{background:rgba(245,158,11,.15);color:#f59e0b}
.badge-purple{background:rgba(124,110,245,.18);color:#a89fff}
.badge-blue{background:rgba(74,158,255,.15);color:#4a9eff}

/* ── PILL TABS ── */
.pill-tabs{display:flex;gap:6px;padding:12px 16px 0;overflow-x:auto}
.pill-tabs::-webkit-scrollbar{display:none}
.pill-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--brd);color:var(--txt1);transition:.15s}
.pill-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── SETUP SCREEN ── */
#setup-screen{
  position:fixed;inset:0;z-index:1000;
  background:var(--bg0);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;
}
.logo-big{font-size:40px;font-weight:800;letter-spacing:-1px;margin-bottom:6px;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.setup-step{width:100%;max-width:400px}
.setup-step h2{font-size:20px;font-weight:700;margin-bottom:6px}
.setup-step p{font-size:14px;color:var(--txt1);margin-bottom:22px;line-height:1.5}
.field-label{font-size:13px;color:var(--txt2);margin-bottom:6px;display:block}
.field-row{margin-bottom:14px}
.color-picker-row{display:flex;gap:8px;flex-wrap:wrap}
.color-swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.15s;flex-shrink:0}
.color-swatch.selected{border-color:#fff;transform:scale(1.15)}

/* ── SETUP STEPPER ── */
.setup-progress{display:flex;gap:6px;margin-bottom:28px}
.setup-dot{width:6px;height:6px;border-radius:3px;background:var(--bg4);transition:.3s}
.setup-dot.active{width:20px;background:var(--accent)}
.setup-dot.done{background:var(--accent)}

/* ── DASHBOARD ── */
.balance-hero{
  margin:16px;
  background:linear-gradient(135deg,rgba(124,110,245,.15),rgba(90,79,212,.08));
  border:1px solid rgba(124,110,245,.25);
  border-radius:var(--rad);padding:20px;
}
.balance-hero-label{font-size:12px;color:var(--txt2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.balance-hero-amount{font-size:36px;font-weight:800;letter-spacing:-1px}
.balance-hero-sub{font-size:13px;color:var(--txt1);margin-top:4px}
.person-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--brd)}
.person-row:last-child{border-bottom:none}
.person-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.person-name{font-size:15px;font-weight:500;flex:1}
.person-amount{font-size:15px;font-weight:600}
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 14px}
.qa-btn{
  background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rad);
  padding:14px;display:flex;flex-direction:column;gap:6px;transition:.15s;
}
.qa-btn:active{background:var(--bg3)}
.qa-btn svg{width:22px;height:22px;stroke:var(--accent);stroke-width:1.7}
.qa-btn span{font-size:13px;font-weight:500}
.recent-label{font-size:13px;color:var(--txt2);padding:0 20px 8px;font-weight:500}
.ticket-item{display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--brd)}
.ticket-icon{width:38px;height:38px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ticket-icon svg{width:18px;height:18px;stroke:var(--txt1);stroke-width:1.7}
.ticket-info{flex:1;min-width:0}
.ticket-store{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ticket-date{font-size:12px;color:var(--txt2);margin-top:1px}
.ticket-amount{font-size:15px;font-weight:600;text-align:right}
.ticket-payer{font-size:11px;color:var(--txt2);text-align:right;margin-top:1px}

/* ── TICKET MODULE ── */
.upload-zone{
  margin:16px;border:2px dashed var(--brd);border-radius:var(--rad);
  padding:36px 20px;text-align:center;cursor:pointer;transition:.2s;
}
.upload-zone:active,.upload-zone.drag{border-color:var(--accent);background:rgba(124,110,245,.06)}
.upload-zone svg{width:36px;height:36px;stroke:var(--txt2);stroke-width:1.5;margin:0 auto 10px}
.upload-zone h3{font-size:16px;font-weight:600;margin-bottom:4px}
.upload-zone p{font-size:13px;color:var(--txt2)}
.upload-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px}

/* ── TICKET EDITOR ── */
.ticket-editor{position:fixed;inset:0;z-index:200;background:var(--bg0);display:flex;flex-direction:column}
.te-header{
  padding:52px 16px 14px;border-bottom:1px solid var(--brd);
  background:rgba(13,13,15,.92);backdrop-filter:blur(18px);
  display:flex;align-items:center;gap:12px;
}
.te-header h2{flex:1;font-size:17px;font-weight:700}
.te-body{flex:1;overflow-y:auto;padding:16px}
.te-section{margin-bottom:20px}
.te-section-title{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;font-weight:600}
.product-row{
  background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rad-sm);
  margin-bottom:8px;padding:12px 14px;
}
.product-top{display:flex;align-items:flex-start;gap:10px}
.product-name-wrap{flex:1;min-width:0}
.product-name{font-size:14px;font-weight:500;margin-bottom:2px}
.product-name-raw{font-size:11px;color:var(--txt3)}
.product-price{font-size:15px;font-weight:700;white-space:nowrap}
.product-bottom{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.assign-btn{
  display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;
  font-size:12px;font-weight:600;border:1.5px solid transparent;cursor:pointer;transition:.15s;
}
.share-btn{
  padding:5px 10px;border-radius:20px;font-size:12px;border:1px solid var(--brd);color:var(--txt2);cursor:pointer;transition:.15s;
}
.share-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(124,110,245,.1)}
.confidence-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.conf-high{background:var(--green)}
.conf-mid{background:var(--amber)}
.conf-low{background:var(--red)}
.te-footer{
  padding:12px 16px max(12px,env(safe-area-inset-bottom));
  border-top:1px solid var(--brd);background:var(--bg1);
  display:flex;gap:10px;
}

/* ── OCR LOADING ── */
.ocr-loading{
  position:fixed;inset:0;z-index:300;background:rgba(13,13,15,.88);
  backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
.spinner{
  width:48px;height:48px;border:3px solid var(--bg4);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.ocr-status{font-size:14px;color:var(--txt1);text-align:center;max-width:240px}

/* ── ERROR CHIPS ── */
.error-chip{
  display:flex;align-items:center;gap:8px;
  background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);
  border-radius:var(--rad-xs);padding:8px 12px;margin-bottom:8px;font-size:13px;color:#f59e0b;
}
.error-chip button{margin-left:auto;font-size:12px;color:var(--txt2);background:var(--bg3);padding:3px 8px;border-radius:4px}

/* ── MANUAL EXPENSE ── */
.me-sheet{position:fixed;inset:0;z-index:200;background:var(--bg0);display:flex;flex-direction:column}
.me-header{padding:52px 16px 14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:12px}
.me-header h2{flex:1;font-size:17px;font-weight:700}
.me-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.me-footer{padding:12px 16px max(12px,env(safe-area-inset-bottom));border-top:1px solid var(--brd);background:var(--bg1)}
.split-row{display:flex;align-items:center;gap:10px}
.split-person{flex:1;text-align:center}
.split-pct{font-size:20px;font-weight:700}
.split-slider{flex:2}

/* ── BALANCE ── */
.balance-card{
  margin:16px;
  background:linear-gradient(135deg,rgba(62,207,142,.12),rgba(74,158,255,.08));
  border:1px solid rgba(62,207,142,.2);
  border-radius:var(--rad);padding:20px;
}
.bc-owes{font-size:16px;font-weight:600;margin-bottom:4px}
.bc-amount{font-size:40px;font-weight:800;letter-spacing:-1px;color:var(--green)}
.bc-detail{font-size:13px;color:var(--txt1);margin-top:6px}
.settle-btn{
  margin:0 16px 14px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border-radius:var(--rad-sm);padding:14px;
  font-size:16px;font-weight:700;width:calc(100% - 32px);
  text-align:center;transition:.15s;display:block;
}
.settle-btn:active{opacity:.8;transform:scale(.98)}
.history-settle{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:1px solid var(--brd)}
.settle-date{font-size:13px;color:var(--txt2);flex:1}
.settle-info{font-size:13px;text-align:right}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 14px}
.stat-card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rad-sm);padding:14px}
.stat-label{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.stat-value{font-size:22px;font-weight:800;letter-spacing:-.5px}
.bar-chart{margin:0 16px 14px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-name{font-size:13px;color:var(--txt1);width:90px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .6s}
.bar-amt{font-size:13px;font-weight:600;width:60px;text-align:right;flex-shrink:0}

/* ── AI CHAT ── */
.ai-chat-btn{
  position:fixed;bottom:90px;right:20px;z-index:90;
  width:52px;height:52px;border-radius:50%;
  background:var(--accent);box-shadow:0 4px 20px rgba(124,110,245,.4);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:800;color:#fff;transition:.15s;
}
.ai-chat-btn:active{transform:scale(.92)}
.ai-badge{
  position:absolute;top:-3px;right:-3px;width:16px;height:16px;
  background:var(--red);border-radius:50%;font-size:10px;font-weight:700;color:#fff;
  display:flex;align-items:center;justify-content:center;
}
.ai-sheet{position:fixed;inset:0;z-index:500;background:var(--bg0);display:flex;flex-direction:column}
.ai-header{padding:52px 16px 14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:12px}
.ai-header h2{flex:1;font-size:17px;font-weight:700}
.ai-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.ai-msg{max-width:82%;padding:11px 14px;border-radius:14px;font-size:14px;line-height:1.5}
.ai-msg.bot{background:var(--bg2);border:1px solid var(--brd);align-self:flex-start;border-bottom-left-radius:4px}
.ai-msg.user{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.ai-qa{background:var(--bg2);border:1px solid rgba(124,110,245,.3);border-radius:var(--rad);padding:14px;margin-bottom:4px}
.ai-qa-q{font-size:14px;font-weight:500;margin-bottom:10px}
.ai-qa-btns{display:flex;gap:8px;flex-wrap:wrap}
.ai-qa-btn{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;border:1px solid var(--brd);color:var(--txt1);transition:.15s}
.ai-qa-btn:active{background:var(--bg4)}
.ai-input-row{display:flex;gap:10px;padding:10px 16px max(10px,env(safe-area-inset-bottom));border-top:1px solid var(--brd);background:var(--bg1)}
.ai-input-row input{flex:1}
.ai-send{width:40px;height:40px;background:var(--accent);border-radius:var(--rad-xs);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-send svg{width:18px;height:18px;stroke:#fff;stroke-width:2}

/* ── SETTINGS ── */
.settings-section{margin-bottom:24px}
.settings-section-title{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.7px;padding:0 20px 8px;font-weight:600}
.settings-row{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--brd)}
.settings-row:last-child{border-bottom:none}
.settings-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.settings-icon svg{width:18px;height:18px;stroke:#fff;stroke-width:1.8}
.settings-label{flex:1;font-size:15px}
.settings-value{font-size:14px;color:var(--txt2)}
.settings-arrow{color:var(--txt3)}

/* ── MODAL/SHEET ── */
.modal-overlay{
  position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.65);
  display:flex;align-items:flex-end;
}
.modal-sheet{
  background:var(--bg1);border-radius:20px 20px 0 0;width:100%;
  padding:20px 20px max(20px,env(safe-area-inset-bottom));
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:600;
  background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rad-sm);
  padding:10px 18px;font-size:14px;font-weight:500;
  animation:toastIn .25s ease;pointer-events:none;white-space:nowrap;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── PREDICTIONS ── */
.pred-card{
  background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rad);
  padding:14px 16px;margin:0 16px 10px;display:flex;align-items:center;gap:12px;
}
.pred-icon{font-size:24px}
.pred-info{flex:1}
.pred-name{font-size:14px;font-weight:600}
.pred-detail{font-size:12px;color:var(--txt2);margin-top:2px}
.pred-days{font-size:13px;font-weight:700;color:var(--amber)}

/* ── INVENTORY ── */
.inv-row{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--brd)}
.inv-bar-track{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.inv-bar-fill{height:100%;border-radius:3px}
.inv-name{font-size:14px;flex-shrink:0;width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inv-days{font-size:12px;color:var(--txt2);width:50px;text-align:right;flex-shrink:0}

/* ── CATEGORY ICONS ── */
.cat-icon{font-size:20px}

/* ── PERSON DISPLAY ── */
.person-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:600}

/* ── HIDDEN FILE INPUT ── */
#file-input{display:none}
#camera-input{display:none}

/* ── SWIPE HINT ── */
.empty-state{text-align:center;padding:60px 30px;color:var(--txt2)}
.empty-state svg{width:48px;height:48px;stroke:var(--txt3);margin:0 auto 14px;display:block}
.empty-state h3{font-size:17px;font-weight:600;color:var(--txt1);margin-bottom:6px}
.empty-state p{font-size:14px;line-height:1.6}
</style>
</head>
<body>

<!-- HIDDEN FILE INPUTS -->
<input type="file" id="file-input" accept="image/*,application/pdf"/>
<input type="file" id="camera-input" accept="image/*" capture="environment"/>

<!-- AI CHAT BUTTON (floating) -->
<button class="ai-chat-btn" id="ai-chat-btn" onclick="openAIChat()" aria-label="Asistente IA">
  ?

}

function fmt(n){
  if(isNaN(n)||n===null||n===undefined) return '0,00 €';
  return Number(n).toFixed(2).replace('.',',') + ' €';
}
function fmtDate(d){
  if(!d) return '';
  const dt = new Date(d);
  if(isNaN(dt)) return d;
  return dt.toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'});
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function showToast(msg, duration=2500){
  const existing = document.querySelector('.toast');
  if(existing) existing.remove();
  const t = document.createElement('div');
  t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), duration);
}

// ── BALANCE CALCULATION ────────────────────────────────────────
function calcBalance(){
  const p1=DB.persons[0], p2=DB.persons[1];
  let p1paid=0, p2paid=0, p1owes=0, p2owes=0;

  // Process tickets
  DB.tickets.forEach(t=>{
    if(!t.confirmed) return;
    const payerIsP1 = t.payer===p1.id;
    t.products && t.products.forEach(prod=>{
      const price = parseFloat(prod.finalPrice||prod.price||0);
      if(isNaN(price)||price<=0) return;
      if(prod.assignedTo===p1.id){
        if(payerIsP1) p1paid+=price; else {p2paid+=price;p1owes+=price;}
      } else if(prod.assignedTo===p2.id){
        if(!payerIsP1) p2paid+=price; else {p1paid+=price;p2owes+=price;}
      } else {
        // shared
        const pct1 = prod.pct1!==undefined ? prod.pct1 : 50;
        const pct2 = 100 - pct1;
        const share1 = price * pct1/100;
        const share2 = price * pct2/100;
        if(payerIsP1){p1paid+=price;p2owes+=share2;}
        else{p2paid+=price;p1owes+=share1;}
      }
    });
  });

  // Process manual expenses
  DB.expenses.forEach(e=>{
    if(!e.confirmed) return;
    const amt = parseFloat(e.total||0);
    if(isNaN(amt)||amt<=0) return;
    const payerIsP1 = e.payer===p1.id;
    const split1 = e.split1!==undefined ? e.split1 : 50;
    const split2 = 100 - split1;
    const share1 = amt * split1/100;
    const share2 = amt * split2/100;
    if(payerIsP1){p1paid+=amt;p2owes+=share2;}
    else{p2paid+=amt;p1owes+=share1;}
  });

  const net = p1owes - p2owes; // positive = p1 owes more than p2
  const p1balance = p1paid;
  const p2balance = p2paid;
  let owes=null, amount=0;
  if(net>0.005){owes=p1.id;amount=net;}
  else if(net<-0.005){owes=p2.id;amount=-net;}

  return {p1balance,p2balance,owes,amount};
}

  this.value='';
});
document.getElementById('camera-input').addEventListener('change',function(){

});

async function processFile(file){
  showOCRLoading('Leyendo imagen...');

  try {
    let base64='', mimeType=file.type;
    if(file.type==='application/pdf'){
      mimeType='application/pdf';
      base64 = await fileToBase64(file);
    } else {
      base64 = await fileToBase64(file);
      mimeType = file.type||'image/jpeg';
    }
    setOCRStatus('Enviando a IA...');
    const result = await analyzeTicketWithGemini(base64, mimeType);
    hideOCRLoading();
    openTicketEditor(result, base64, mimeType);
  } catch(err){
    hideOCRLoading();
    showToast('Error al procesar: '+err.message);
    openTicketEditor(getEmptyTicket(), null, null);
  }
}

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=()=>rej(new Error('No se pudo leer el archivo'));
    r.readAsDataURL(file);
  });
}

// ── GEMINI API ─────────────────────────────────────────────────
async function callGemini(prompt, base64, mimeType, systemPrompt, retries=3){
  const key = DB.apiKey;
  if(!key) throw new Error('No hay API key configurada. Ve a Configuración.');

  const parts = [];
  if(base64 && mimeType){
    parts.push({inline_data:{mime_type:mimeType,data:base64}});
  }
  parts.push({text: prompt});

  const body = {
    contents:[{role:'user',parts}],
    generationConfig:{temperature:0.2,maxOutputTokens:2048}
  };
  if(systemPrompt){
    body.system_instruction = {parts:[{text:systemPrompt}]};
  }

  for(let attempt=0; attempt<retries; attempt++){
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,
      {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}
    );
    if(res.status===429){
      const wait = (attempt+1)*15000;
      setOCRStatus(`Límite de peticiones alcanzado. Reintentando en ${wait/1000}s... (${attempt+1}/${retries})`);
      await new Promise(r=>setTimeout(r,wait));
      continue;
    }
    if(!res.ok){
      const err = await res.json().catch(()=>({}));
      throw new Error(err.error?.message||`Error HTTP ${res.status}`);
    }
    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text||'';
    return text;
  }
  throw new Error('Demasiadas peticiones a la API. Espera un minuto e inténtalo de nuevo.');
}

async function analyzeTicketWithGemini(base64, mimeType){
  const p1=DB.persons[0], p2=DB.persons[1];
  const knownProds = Object.entries(DB.knowledge.products).slice(0,10)
    .map(([k,v])=>`${k}:${v.shared?'común':personName(v.person)}`).join(';');
  const prompt = `Analiza este ticket de supermercado español. Devuelve SOLO JSON sin markdown:
{"store":"","date":"YYYY-MM-DD","total":0,"last4":null,"products":[{"rawName":"","name":"","price":0,"discount":0,"qty":1,"confidence":0.9,"category":"alimentación|higiene|limpieza|bebidas|lácteos|fruta|carne|pescado|otro"}],"errors":[],"warnings":[]}
Reglas: normaliza nombres (SAL TO→Salsa tomate), detecta descuentos, date null si no se ve, confidence baja si dudas.
Productos conocidos: ${knownProds||'ninguno aún'}
Responde ÚNICAMENTE el JSON.`;

  const text = await callGemini(prompt, base64, mimeType);
  try {
    const clean = text.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
    const parsed = JSON.parse(clean);
    // Apply knowledge to suggest assignments
    parsed.products = (parsed.products||[]).map(p=>applyKnowledgeToProduct(p));
    parsed.type = 'ticket';
    parsed.id = uid();
    parsed.payer = DB.persons[0].id;
    parsed.confirmed = false;
    parsed.createdAt = new Date().toISOString();
    // Try to detect payer from card
    if(parsed.last4 && DB.knowledge.cards[parsed.last4]){
      parsed.payer = DB.knowledge.cards[parsed.last4];
    }
    return parsed;
  } catch(e){
    return getEmptyTicket();
  }
}

function buildKnowledgeHint(){
  const entries = Object.entries(DB.knowledge.products).slice(0,30);
  if(entries.length===0) return '';
  return `\nProductos aprendidos (usa para sugerir asignación):\n${entries.map(([k,v])=>`- "${k}" → ${v.shared?'compartido':personName(v.person)} (${v.pct||50}%)`).join('\n')}`;
}

function applyKnowledgeToProduct(prod){
  const key = normalizeKey(prod.name||prod.rawName||'');
  const known = DB.knowledge.products[key];
  if(known){
    prod.assignedTo = known.shared ? null : known.person;
    prod.shared = known.shared;
    prod.pct1 = known.pct1||50;
    prod.knownMatch = true;
  } else {
    // Check OCR raw match
    const ocrKey = (prod.rawName||'').trim().toUpperCase();
    const ocrMatch = Object.values(DB.knowledge.products).find(v=>v.ocr_raw&&v.ocr_raw.includes(ocrKey));
    if(ocrMatch){
      prod.assignedTo = ocrMatch.shared?null:ocrMatch.person;
      prod.shared = ocrMatch.shared;
      prod.pct1 = ocrMatch.pct1||50;
      prod.knownMatch = true;
    } else {
      prod.assignedTo = null;
      prod.shared = true;
      prod.pct1 = 50;
    }
  }
  prod.finalPrice = prod.price;
  return prod;
}

function normalizeKey(name){
  return name.toLowerCase().replace(/[^a-záéíóúñ0-9]/g,' ').replace(/\s+/g,' ').trim();
}

function renderProductRow(prod, i){

  const p1Style = assignedTo===p1.id?`background:${p1.color}33;color:${p1.color};border-color:${p1.color}`:`color:var(--txt2);border:1px solid var(--brd)`;

  const sharedStyle = isShared?`background:rgba(74,158,255,.15);color:#4a9eff;border-color:#4a9eff`:`color:var(--txt2);border:1px solid var(--brd)`;

  return `
    <div class="product-row" id="prod-${i}">
      <div class="product-top">
        <div class="confidence-dot ${confClass}" title="${confPct}% confianza"></div>
        <div class="product-name-wrap">

          ${prod.rawName&&prod.rawName!==prod.name?`<div class="product-name-raw">${prod.rawName}</div>`:''}
        </div>
        <input type="number" value="${(prod.finalPrice||prod.price||0).toFixed(2)}" step="0.01"
          style="width:70px;text-align:right;font-size:14px;font-weight:700;background:transparent;border:none;padding:0;color:var(--txt0)"
          oninput="currentTicket.products[${i}].finalPrice=parseFloat(this.value)||0"/>

        <button class="assign-btn" style="${p1Style}" onclick="assignProduct(${i},'${p1.id}')">${p1.name}</button>
        <button class="assign-btn" style="${p2Style}" onclick="assignProduct(${i},'${p2.id}')">${p2.name}</button>
        <button class="assign-btn" style="${sharedStyle}" onclick="assignProduct(${i},null)">Compartido</button>
        ${isShared?`<button class="share-btn active" onclick="editSplit(${i})">

function dismissError(i){
  const allErrors = [...(currentTicket.errors||[]),...(currentTicket.warnings||[])];
  allErrors.splice(i,1);
  currentTicket.errors = allErrors.slice(0, currentTicket.errors.length-1>=0?currentTicket.errors.length-1:0);
  currentTicket.warnings = [];
  renderTicketEditor();
}

function saveTicket(){
  const t = currentTicket;
  t.confirmed = true;
  // Recalculate total from products if needed
  if(!t.total||t.total===0){
    t.total = (t.products||[]).reduce((sum,p)=>sum+(parseFloat(p.finalPrice||p.price||0)),0);
  }
  // Learn from this ticket
  learnFromTicket(t);
  // Save
  const idx = DB.tickets.findIndex(x=>x.id===t.id);
  if(idx>=0) DB.tickets[idx]=t;
  else DB.tickets.push(t);
  saveDB();
  // Maybe generate AI questions
  generateAIQuestions(t);
  closeTicketEditor();
  showToast('Ticket guardado ✓');
  showScreen(currentScreen==='tickets'?'tickets':'home');
}

function learnFromTicket(t){
  // Learn card → person
  if(t.last4&&t.payer){
    DB.knowledge.cards[t.last4] = t.payer;
  }
  // Learn products
  (t.products||[]).forEach(prod=>{
    const key = normalizeKey(prod.name||'');
    if(!key) return;
    const ocrRaw = prod.rawName?(prod.rawName.trim().toUpperCase()):'';
    const existing = DB.knowledge.products[key]||{count:0,ocr_raw:[]};
    DB.knowledge.products[key] = {
      person: prod.assignedTo||null,
      shared: !prod.assignedTo,
      pct1: prod.pct1||50,
      count: (existing.count||0)+1,
      category: prod.category,
      ocr_raw: ocrRaw&&!existing.ocr_raw.includes(ocrRaw)?[...existing.ocr_raw,ocrRaw]:existing.ocr_raw
    };
  });
}

function detectAnomalies(){
  const msgs = [];
  const now = new Date();
  const thisMonth = DB.tickets.filter(t=>t.confirmed&&t.date&&new Date(t.date).getMonth()===now.getMonth());
  const lastMonth = DB.tickets.filter(t=>{
    if(!t.confirmed||!t.date) return false;
    const d=new Date(t.date);
    return d.getMonth()===(now.getMonth()-1+12)%12;
  });
  const thisTotal = thisMonth.reduce((s,t)=>s+(parseFloat(t.total)||0),0);
  const lastTotal = lastMonth.reduce((s,t)=>s+(parseFloat(t.total)||0),0);
  if(lastTotal>0&&thisTotal>lastTotal*1.3){
    msgs.push(`Este mes gastáis un ${Math.round((thisTotal/lastTotal-1)*100)}% más que el mes pasado.`);
  }
  // Detect expensive products
  const priceMap={};
  DB.tickets.filter(t=>t.confirmed).forEach(t=>{
    (t.products||[]).forEach(p=>{
      const key=normalizeKey(p.name||'');
      if(!key) return;
      const pr=parseFloat(p.finalPrice||p.price||0);
      if(!priceMap[key]) priceMap[key]={prices:[],name:p.name};
      priceMap[key].prices.push(pr);
    });
  });
  Object.entries(priceMap).forEach(([k,v])=>{
    if(v.prices.length<3) return;
    const avg=v.prices.slice(0,-1).reduce((s,x)=>s+x,0)/(v.prices.length-1);
    const last=v.prices[v.prices.length-1];
    if(last>avg*1.25&&avg>0.5){
      msgs.push(`El precio de "${v.name}" ha subido un ${Math.round((last/avg-1)*100)}% respecto a tu media habitual.`);
    }
  });
  return msgs.slice(0,3);
}

function renderInventorySection(){
  const predictions = getPredictions();
  if(predictions.length===0){
    return `<div class="empty-state" style="padding:20px"><p>Introduce más tickets para estimar la despensa</p></div>`;
  }
  return predictions.slice(0,8).map(p=>{
    const pct = Math.max(0,Math.min(100,100-Math.round((p.days/p.freq)*100)));
    const color = pct<30?'var(--red)':pct<60?'var(--amber)':'var(--green)';
    return `
      <div class="inv-row">
        <div class="inv-name">${p.emoji} ${p.name}</div>
        <div class="inv-bar-track" style="flex:1;margin:0 10px"><div class="inv-bar-fill" style="width:${pct}%;background:${color}"></div></div>
        <div class="inv-days">~${p.days}d</div>
      </div>
    `;
  }).join('');
}

function getPredictions(){
  const productHistory={};
  DB.tickets.filter(t=>t.confirmed&&t.date).forEach(t=>{
    const d=new Date(t.date).getTime();
    (t.products||[]).forEach(prod=>{
      const key=normalizeKey(prod.name||'');
      if(!key) return;
      if(!productHistory[key]) productHistory[key]={name:prod.name,dates:[],category:prod.category||'otro'};
      productHistory[key].dates.push(d);
    });
  });

  const now=Date.now();
  const results=[];
  Object.values(productHistory).forEach(item=>{
    if(item.dates.length<2) return;
    item.dates.sort((a,b)=>a-b);
    const gaps=[];
    for(let i=1;i<item.dates.length;i++) gaps.push((item.dates[i]-item.dates[i-1])/(1000*60*60*24));
    const avgFreq=gaps.reduce((s,g)=>s+g,0)/gaps.length;
    const lastDate=item.dates[item.dates.length-1];
    const daysSince=(now-lastDate)/(1000*60*60*24);
    const daysLeft=Math.max(0,Math.round(avgFreq-daysSince));

    const catEmojis={alimentación:'🥫',higiene:'🧴',limpieza:'🧹',bebidas:'🧃',congelados:'❄️',lácteos:'🥛',fruta:'🍎',carne:'🥩',pescado:'🐟',otro:'📦'};
    results.push({
      name:item.name,days:daysLeft,freq:Math.round(avgFreq),
      emoji:catEmojis[item.category]||'🛒',
      detail:`Cada ~${Math.round(avgFreq)} días · última vez hace ${Math.round(daysSince)}d`
    });
  });
  return results.sort((a,b)=>a.days-b.days);
}

  a.download='clarito-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}
function resetAll(){
  openModal(`
    <div class="modal-title">⚠️ ¿Borrar todo?</div>
    <p style="font-size:14px;color:var(--txt1);margin-bottom:20px">Se borrarán todos los tickets, gastos y conocimiento. Esta acción no se puede deshacer.</p>
    <div style="display:flex;gap:10px">
      <button class="btn-secondary" style="flex:1" onclick="closeModal()">Cancelar</button>
      <button class="btn-danger" style="flex:1" onclick="doResetAll()">Borrar todo</button>
    </div>
  `);
}
function doResetAll(){
  localStorage.clear();
  location.reload();
}

// ── AI CHAT ────────────────────────────────────────────────────
function openAIChat(){
  renderAIChat();
  document.getElementById('ai-chat-sheet').style.display='flex';
}

function renderAIChat(){
  const sheet = document.getElementById('ai-chat-sheet');
  const pending = DB.aiQuestions.filter(q=>!q.answered);

  sheet.innerHTML = `
    <div class="ai-header">
      <button onclick="closeAIChat()" style="color:var(--txt1)">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <h2>Asistente IA</h2>
      ${pending.length>0?`<span class="badge badge-red">${pending.length} pendientes</span>`:''}
    </div>
    <div class="ai-messages" id="ai-messages">
      ${pending.length>0?`
        <div class="ai-msg bot">Tengo ${pending.length} pregunta${pending.length>1?'s':''} para aprender mejor:</div>
        ${pending.slice(0,5).map(q=>renderAIQuestion(q)).join('')}
      `:`<div class="ai-msg bot">¡Hola! Soy tu asistente de Clarito. Pregúntame sobre gastos, balances, predicciones o lo que necesites.</div>`}
      ${DB.aiConvMessages.slice(-10).map(m=>`<div class="ai-msg ${m.role}">${m.content}</div>`).join('')}
    </div>
    <div class="ai-input-row">
      <input id="ai-input" placeholder="Pregunta algo..." onkeydown="if(event.key==='Enter')sendAIMessage()"/>
      <button class="ai-send" onclick="sendAIMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  `;
}

function renderAIQuestion(q){
  return `
    <div class="ai-qa" id="qa-${q.id}">
      <div class="ai-qa-q">${q.question}</div>
      <div class="ai-qa-btns">
        ${(q.options||['Sí','No']).map(opt=>`
          <button class="ai-qa-btn" onclick="answerAIQuestion('${q.id}','${opt}')">${opt}</button>
        `).join('')}
        <button class="ai-qa-btn" onclick="answerAIQuestion('${q.id}','skip')" style="color:var(--txt3)">Saltar</button>
      </div>
    </div>
  `;
}

function answerAIQuestion(qid, answer){
  const q = DB.aiQuestions.find(x=>x.id===qid);
  if(!q) return;
  q.answered=true;q.answer=answer;
  // Apply learning
  if(q.type==='product_assign'&&answer!=='skip'){
    const key=normalizeKey(q.productName||'');
    if(key){
      const personId=answer==='skip'?null:(answer==='Compartido'?null:q.personId||null);
      DB.knowledge.products[key]={
        ...(DB.knowledge.products[key]||{}),
        person:personId,shared:!personId,pct1:50
      };
    }
  } else if(q.type==='card_assign'&&answer!=='skip'&&q.personId){
    DB.knowledge.cards[q.last4]=q.personId;
  }
  saveDB();
  updateAIBadge();
  // Remove the question element
  const el=document.getElementById('qa-'+qid);
  if(el){el.style.opacity='0.4';el.querySelector('.ai-qa-btns').innerHTML='<span style="font-size:12px;color:var(--txt2)">✓ Respondido</span>';}
}

async function sendAIMessage(){
  const input=document.getElementById('ai-input');
  const msg=input.value.trim();
  if(!msg) return;
  input.value='';

  DB.aiConvMessages.push({role:'user',content:msg});
  renderAIChat();

  // Build context
  const {p1balance,p2balance,owes,amount}=calcBalance();
  const context=`
Eres el asistente de Clarito, una app de gestión de gastos domésticos compartidos.
Personas: ${DB.persons.map(p=>p.name).join(' y ')}.
Balance actual: ${amount>0?`${personName(owes)} debe ${fmt(amount)}`:'cuentas al día'}.
Tickets registrados: ${DB.tickets.filter(t=>t.confirmed).length}.
Gastos manuales: ${DB.expenses.filter(e=>e.confirmed).length}.
Responde de forma amigable, breve y en español. Máximo 3 párrafos.
`;

  try {
    const resp = await callGemini(context+'\n\nPregunta del usuario: '+msg, null, null, null);
    DB.aiConvMessages.push({role:'bot',content:resp});
    saveDB();
    renderAIChat();
    // Scroll to bottom
    const msgs=document.getElementById('ai-messages');
    if(msgs) msgs.scrollTop=msgs.scrollHeight;
  } catch(err){
    DB.aiConvMessages.push({role:'bot',content:'Lo siento, no pude conectar con la IA: '+err.message});
    renderAIChat();
  }
}

function closeAIChat(){
  document.getElementById('ai-chat-sheet').style.display='none';
  updateAIBadge();
}

function updateAIBadge(){
  const pending=(DB.aiQuestions||[]).filter(q=>!q.answered).length;
  const badge=document.getElementById('ai-badge');
  if(badge){
    badge.style.display=pending>0?'flex':'none';
    badge.textContent=pending;
  }
}

function generateAIQuestions(ticket){
  const newQs=[];
  // Unknown card?
  if(ticket.last4&&!DB.knowledge.cards[ticket.last4]){
    DB.persons.forEach(p=>{
      // Check if it might match a known card pattern
    });
    // Ask who owns it
    const q={
      id:uid(),type:'card_assign',answered:false,last4:ticket.last4,
      question:`¿La tarjeta terminada en ${ticket.last4} pertenece a ${DB.persons[0].name} o a ${DB.persons[1].name}?`,
      options:[DB.persons[0].name,DB.persons[1].name],
      personId:DB.persons[0].id
    };
    // Actually make it pick
    q.options=[DB.persons[0].name,DB.persons[1].name];
    newQs.push(q);
  }
  // Products with low confidence
  (ticket.products||[]).filter(p=>p.confidence<0.6&&!p.knownMatch).forEach(p=>{
    const key=normalizeKey(p.name||'');
    if(!DB.knowledge.products[key]){
      newQs.push({
        id:uid(),type:'product_assign',answered:false,
        productName:p.name,
        question:`"${p.name}" (${fmt(p.finalPrice||0)}) · ¿A quién pertenece o es compartido?`,
        options:[DB.persons[0].name,DB.persons[1].name,'Compartido'],
        personId:null
      });
    }
  });
  if(newQs.length>0){
    DB.aiQuestions.push(...newQs);
    saveDB();
    updateAIBadge();
  }
}

// ── BOOT ──────────────────────────────────────────────────────
function boot(){
  loadDB();
  const needsSetup = !DB.apiKey || DB.persons[0].name==='Persona A';
  if(needsSetup){
    startSetup();
  } else {
    document.getElementById('setup-screen').style.display='none';
    showScreen('home');
    updateAIBadge();
  }
}

boot();
</script>
