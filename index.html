<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Clarito"/>
<meta name="theme-color" content="#0d0d0f"/>
<title>Clarito</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg0:#0d0d0f;--bg1:#141417;--bg2:#1c1c21;--bg3:#242429;--bg4:#2e2e35;
  --txt0:#f0f0f2;--txt1:#b8b8c2;--txt2:#737380;--txt3:#45454f;
  --brd:#2a2a32;
  --rad:14px;--rad-sm:8px;--rad-xs:5px;
  --accent:#7c6ef5;--accent2:#5a4fd4;
  --green:#3ecf8e;--red:#e5534b;--amber:#f59e0b;--blue:#4a9eff;
}
html,body{height:100%;background:var(--bg0);color:var(--txt0);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;overflow:hidden}
button{background:none;border:none;cursor:pointer;color:inherit;font-family:inherit}
input,textarea,select{font-family:inherit;background:var(--bg3);color:var(--txt0);border:1px solid var(--brd);border-radius:var(--rad-sm);padding:10px 14px;font-size:15px;outline:none;width:100%}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}
#view{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:80px}
#nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  background:rgba(20,20,23,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--brd);
  display:flex;justify-content:space-around;align-items:center;
  padding:8px 0 max(8px,env(safe-area-inset-bottom));
  z-index:100;
}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 10px;border-radius:var(--rad-sm);transition:.2s}
.nav-btn svg{width:24px;height:24px;stroke-width:1.7;stroke:var(--txt2)}
.nav-btn span{font-size:10px;color:var(--txt2)}
.nav-btn.active svg{stroke:var(--accent)}
.nav-btn.active span{color:var(--accent)}
.screen-header{
  position:sticky;top:0;z-index:50;
  background:rgba(13,13,15,0.88);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  padding:52px 20px 14px;border-bottom:1px solid var(--brd);
}
.screen-header h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
.screen-header p{font-size:13px;color:var(--txt2);margin-top:3px}
.card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rad);padding:16px;margin:0 16px 12px}
.btn-primary{background:var(--accent);color:#fff;border-radius:var(--rad-sm);padding:12px 20px;font-size:15px;font-weight:600;width:100%;text-align:center;transition:.15s;display:block}
.btn-primary:active{opacity:.8;transform:scale(.98)}
.btn-secondary{background:var(--bg3);color:var(--txt0);border:1px solid var(--brd);border-radius:var(--rad-sm);padding:11px 18px;font-size:14px;font-weight:500;transition:.15s}
.btn-secondary:active{opacity:.75}
.btn-danger{background:rgba(229,83,75,.15);color:var(--red);border:1px solid rgba(229,83,75,.3);border-radius:var(--rad-sm);padding:11px 18px;font-size:14px;font-weight:500}
.btn-ghost{color:var(--txt1);font-size:14px;padding:8px 12px;border-radius:var(--rad-xs);transition:.15s}
.btn-ghost:active{background:var(--bg3)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-red{background:rgba(229,83,75,.18);color:#ff6b65}
.badge-green{background:rgba(62,207,142,.15);color:#3ecf8e}
.badge-amber{background:rgba(245,158,11,.15);color:#f59e0b}
.badge-purple{background:rgba(124,110,245,.18);color:#a89fff}
.pill-tabs{display:flex;gap:6px;padding:12px 16px 0;overflow-x:auto}
.pill-tabs::-webkit-scrollbar{display:none}
.pill-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--brd);color:var(--txt1);transition:.15s}
.pill-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* SETUP */
#setup-screen{position:fixed;inset:0;z-index:1000;background:var(--bg0);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;overflow-y:auto}
.logo-wrap{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.logo-img{width:52px;height:52px;border-radius:16px;object-fit:cover;background:var(--bg3)}
.logo-big{font-size:38px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.setup-step{width:100%;max-width:400px}
.setup-step h2{font-size:20px;font-weight:700;margin-bottom:6px}
.setup-step p{font-size:14px;color:var(--txt1);margin-bottom:22px;line-height:1.5}
.field-label{font-size:13px;color:var(--txt2);margin-bottom:6px;display:block}
.field-row{margin-bottom:14px}
.color-picker-row{display:flex;gap:8px;flex-wrap:wrap}
.color-swatch{width:34px;height:34px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.15s;flex-shrink:0}
.color-swatch.selected{border-color:#fff;transform:scale(1.15)}
.setup-progress{display:flex;gap:6px;margin-bottom:28px}
.setup-dot{width:6px;height:6px;border-radius:3px;background:var(--bg4);transition:.3s}
.setup-dot.active{width:20px;background:var(--accent)}
.setup-dot.done{background:var(--accent)}

/* HOME */
.balance-hero{margin:16px;background:linear-gradient(135deg,rgba(124,110,245,.15),rgba(90,79,212,.08));border:1px solid rgba(124,110,245,.25);border-radius:var(--rad);padding:20px}
.balance-hero-label{font-size:12px;color:var(--txt2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.balance-hero-amount{font-size:36px;font-weight:800;letter-spacing:-1px}
.balance-hero-sub{font-size:13px;color:var(--txt1);margin-top:4px}
.person-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--brd)}
.person-row:last-child{border-bottom:none}
.person-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.person-name{font-size:15px;font-weight:500;flex:1}
.person-amount{font-size:15px;font-weight:600}
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 14px}
.qa-btn{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rad);padding:14px;display:flex;flex-direction:column;gap:6px;transition:.15s}
.qa-btn:active{background:var(--bg3)}
.qa-btn svg{width:22px;height:22px;stroke:var(--accent);stroke-width:1.7}
.qa-btn span{font-size:13px;font-weight:500}
.recent-label{font-size:13px;color:var(--txt2);padding:0 20px 8px;font-weight:500}
.ticket-item{display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--brd);cursor:pointer}
.ticket-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ticket-icon svg{width:18px;height:18px;stroke-width:1.7}
.ticket-info{flex:1;min-width:0}
.ticket-store{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ticket-date{font-size:12px;color:var(--txt2);margin-top:1px}
.ticket-amount{font-size:15px;font-weight:600;text-align:right}
.ticket-payer{font-size:11px;color:var(--txt2);text-align:right;margin-top:1px}

/* TICKETS */
.upload-zone{margin:16px;border:2px dashed var(--brd);border-radius:var(--rad);padding:36px 20px;text-align:center;cursor:pointer;transition:.2s}
.upload-zone:active,.upload-zone.drag{border-color:var(--accent);background:rgba(124,110,245,.06)}
.upload-zone svg{width:36px;height:36px;stroke:var(--txt2);stroke-width:1.5;margin:0 auto 10px}
.upload-zone h3{font-size:16px;font-weight:600;margin-bottom:4px}
.upload-zone p{font-size:13px;color:var(--txt2)}
.upload-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px}

/* TICKET EDITOR */
.ticket-editor{position:fixed;inset:0;z-index:200;background:var(--bg0);display:flex;flex-direction:column}
.te-header{padding:52px 16px 14px;border-bottom:1px solid var(--brd);background:rgba(13,13,15,.92);backdrop-filter:blur(18px);display:flex;align-items:center;gap:12px}
.te-header h2{flex:1;font-size:17px;font-weight:700}
.te-body{flex:1;overflow-y:auto;padding:16px}
.te-section{margin-bottom:20px}
.te-section-title{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;font-weight:600}
.product-row{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rad-sm);margin-bottom:8px;padding:12px 14px}
.product-top{display:flex;align-items:flex-start;gap:10px}
.product-name-wrap{flex:1;min-width:0}
.product-name-raw{font-size:11px;color:var(--txt3)}
.product-bottom{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.assign-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid transparent;cursor:pointer;transition:.15s}
.share-btn{padding:5px 10px;border-radius:20px;font-size:12px;border:1px solid var(--brd);color:var(--txt2);cursor:pointer;transition:.15s}
.share-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(124,110,245,.1)}
.confidence-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:6px}
.conf-high{background:var(--green)}
.conf-mid{background:var(--amber)}
.conf-low{background:var(--red)}
.te-footer{padding:12px 16px max(12px,env(safe-area-inset-bottom));border-top:1px solid var(--brd);background:var(--bg1);display:flex;gap:10px}

/* OCR LOADING */
.ocr-loading{position:fixed;inset:0;z-index:300;background:rgba(13,13,15,.92);backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.spinner{width:48px;height:48px;border:3px solid var(--bg4);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ocr-status{font-size:14px;color:var(--txt1);text-align:center;max-width:260px;line-height:1.5}
.error-chip{display:flex;align-items:center;gap:8px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);border-radius:var(--rad-xs);padding:8px 12px;margin-bottom:8px;font-size:13px;color:#f59e0b}
.error-chip button{margin-left:auto;font-size:12px;color:var(--txt2);background:var(--bg3);padding:3px 8px;border-radius:4px}

/* MANUAL EXPENSE */
.me-sheet{position:fixed;inset:0;z-index:200;background:var(--bg0);display:flex;flex-direction:column}
.me-header{padding:52px 16px 14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:12px}
.me-header h2{flex:1;font-size:17px;font-weight:700}
.me-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.me-footer{padding:12px 16px max(12px,env(safe-area-inset-bottom));border-top:1px solid var(--brd);background:var(--bg1)}
.split-row{display:flex;align-items:center;gap:10px}
.split-person{flex:1;text-align:center}
.split-pct{font-size:20px;font-weight:700}
.split-slider{flex:2}

/* BALANCE */
.balance-card{margin:16px;background:linear-gradient(135deg,rgba(62,207,142,.12),rgba(74,158,255,.08));border:1px solid rgba(62,207,142,.2);border-radius:var(--rad);padding:20px}
.bc-owes{font-size:16px;font-weight:600;margin-bottom:4px}
.bc-amount{font-size:40px;font-weight:800;letter-spacing:-1px;color:var(--green)}
.bc-detail{font-size:13px;color:var(--txt1);margin-top:6px}
.settle-btn{margin:0 16px 14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-radius:var(--rad-sm);padding:14px;font-size:16px;font-weight:700;width:calc(100% - 32px);text-align:center;transition:.15s;display:block}
.settle-btn:active{opacity:.8;transform:scale(.98)}
.history-settle{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:1px solid var(--brd)}
.settle-date{font-size:13px;color:var(--txt2);flex:1}
.settle-info{font-size:13px;text-align:right}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 14px}
.stat-card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rad-sm);padding:14px}
.stat-label{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.stat-value{font-size:22px;font-weight:800;letter-spacing:-.5px}
.bar-chart{margin:0 16px 14px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-name{font-size:13px;color:var(--txt1);width:100px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .6s}
.bar-amt{font-size:13px;font-weight:600;width:60px;text-align:right;flex-shrink:0}

/* AI CHAT */
.ai-chat-btn{position:fixed;bottom:90px;right:20px;z-index:90;width:52px;height:52px;border-radius:50%;background:var(--accent);box-shadow:0 4px 20px rgba(124,110,245,.4);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;transition:.15s}
.ai-chat-btn:active{transform:scale(.92)}
.ai-badge{position:absolute;top:-3px;right:-3px;width:16px;height:16px;background:var(--red);border-radius:50%;font-size:10px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center}
.ai-sheet{position:fixed;inset:0;z-index:500;background:var(--bg0);display:flex;flex-direction:column}
.ai-header{padding:52px 16px 14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:12px}
.ai-header h2{flex:1;font-size:17px;font-weight:700}
.ai-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.ai-msg{max-width:82%;padding:11px 14px;border-radius:14px;font-size:14px;line-height:1.5}
.ai-msg.bot{background:var(--bg2);border:1px solid var(--brd);align-self:flex-start;border-bottom-left-radius:4px}
.ai-msg.user{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.ai-qa{background:var(--bg2);border:1px solid rgba(124,110,245,.3);border-radius:var(--rad);padding:14px;margin-bottom:4px}
.ai-qa-q{font-size:14px;font-weight:500;margin-bottom:10px}
.ai-qa-btns{display:flex;gap:8px;flex-wrap:wrap}
.ai-qa-btn{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;border:1px solid var(--brd);color:var(--txt1);transition:.15s}
.ai-qa-btn:active{background:var(--bg4)}
.ai-input-row{display:flex;gap:10px;padding:10px 16px max(10px,env(safe-area-inset-bottom));border-top:1px solid var(--brd);background:var(--bg1)}
.ai-input-row input{flex:1}
.ai-send{width:40px;height:40px;background:var(--accent);border-radius:var(--rad-xs);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-send svg{width:18px;height:18px;stroke:#fff;stroke-width:2}

/* SETTINGS */
.settings-section{margin-bottom:24px}
.settings-section-title{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.7px;padding:0 20px 8px;font-weight:600}
.settings-row{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--brd);cursor:pointer}
.settings-row:last-child{border-bottom:none}
.settings-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.settings-icon svg{width:18px;height:18px;stroke:#fff;stroke-width:1.8}
.settings-label{flex:1;font-size:15px}
.settings-value{font-size:14px;color:var(--txt2)}
.settings-arrow{color:var(--txt3)}
.modal-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.65);display:flex;align-items:flex-end}
.modal-sheet{background:var(--bg1);border-radius:20px 20px 0 0;width:100%;padding:20px 20px max(20px,env(safe-area-inset-bottom));animation:slideUp .25s ease;max-height:85vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:600;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rad-sm);padding:10px 18px;font-size:14px;font-weight:500;animation:toastIn .25s ease;pointer-events:none;white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.pred-card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rad);padding:14px 16px;margin:0 16px 10px;display:flex;align-items:center;gap:12px}
.pred-info{flex:1}
.pred-name{font-size:14px;font-weight:600}
.pred-detail{font-size:12px;color:var(--txt2);margin-top:2px}
.pred-days{font-size:13px;font-weight:700;color:var(--amber)}
.inv-row{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--brd)}
.inv-bar-track{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.inv-bar-fill{height:100%;border-radius:3px}
.inv-name{font-size:14px;flex-shrink:0;width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inv-days{font-size:12px;color:var(--txt2);width:50px;text-align:right;flex-shrink:0}
.empty-state{text-align:center;padding:60px 30px;color:var(--txt2)}
.empty-state svg{width:48px;height:48px;stroke:var(--txt3);margin:0 auto 14px;display:block}
.empty-state h3{font-size:17px;font-weight:600;color:var(--txt1);margin-bottom:6px}
.empty-state p{font-size:14px;line-height:1.6}
#file-input,#camera-input{display:none}
</style>
</head>
<body>

<input type="file" id="file-input" accept="image/*,application/pdf"/>
<input type="file" id="camera-input" accept="image/*" capture="environment"/>

<button class="ai-chat-btn" id="ai-chat-btn" onclick="openAIChat()" aria-label="Asistente IA" style="position:fixed">
  ?
  <span class="ai-badge" id="ai-badge" style="display:none">0</span>
</button>

<div id="app">
  <div id="view"></div>
  <nav id="nav">
    <button class="nav-btn active" id="nav-home" onclick="showScreen('home')">
      <svg viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Inicio</span>
    </button>
    <button class="nav-btn" id="nav-tickets" onclick="showScreen('tickets')">
      <svg viewBox="0 0 24 24" fill="none"><rect x="2" y="3" width="20" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>
      <span>Tickets</span>
    </button>
    <button class="nav-btn" id="nav-balance" onclick="showScreen('balance')">
      <svg viewBox="0 0 24 24" fill="none"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      <span>Balance</span>
    </button>
    <button class="nav-btn" id="nav-stats" onclick="showScreen('stats')">
      <svg viewBox="0 0 24 24" fill="none"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>Stats</span>
    </button>
    <button class="nav-btn" id="nav-settings" onclick="showScreen('settings')">

// ── IMAGE → BLOB URL (resize for OCR) ─────────────────────────
function resizeImageToBlob(file, maxW=1400){
  return new Promise((res,rej)=>{
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      const c=document.createElement('canvas');
      c.width=w;c.height=h;
      const ctx=c.getContext('2d');
      ctx.filter='contrast(1.15) brightness(1.05)';
      ctx.drawImage(img,0,0,w,h);
      c.toBlob(blob=>{
        if(!blob) rej(new Error('No se pudo convertir la imagen'));
        else res(URL.createObjectURL(blob));
      },'image/jpeg',0.92);
    };
    img.onerror=()=>rej(new Error('No se pudo cargar la imagen'));
    img.src=url;
  });
}

// ── GEMINI TEXT-ONLY (no images) ──────────────────────────────
async function callGemini(prompt){
  const key=DB.apiKey;
  if(!key) throw new Error('No hay API key. Ve a Configuración.');
  const body={
    contents:[{role:'user',parts:[{text:prompt}]}],
    generationConfig:{temperature:0.1,maxOutputTokens:2048}
  };
  const models=['gemini-2.0-flash-lite','gemini-2.0-flash'];
  for(const model of models){
    for(let attempt=0;attempt<2;attempt++){
      const res=await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,
        {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}
      );
      if(res.status===429){
        const wait=(attempt+1)*15000;
        setOCRStatus(`Cuota agotada. Reintentando en ${wait/1000}s...`);
        await new Promise(r=>setTimeout(r,wait));
        continue;
      }
      if(res.status===404) break;
      if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error?.message||`HTTP ${res.status}`);}
      const data=await res.json();
      return data.candidates?.[0]?.content?.parts?.[0]?.text||'';
    }
  }
  throw new Error('No se pudo conectar con Gemini. Inténtalo más tarde.');
}

// ── LOCAL JS TICKET PARSER ─────────────────────────────────────
function parseTicketText(raw){
  const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l.length>1);
  const result={store:'',date:null,total:0,last4:null,products:[],errors:[],warnings:[]};

  // --- Store detection ---
  const STORES=['mercadona','lidl','dia','carrefour','aldi','eroski','alcampo','consum','bonpreu','condis','hipercor','el corte inglés','freshco','supercor'];
  for(const l of lines.slice(0,6)){
    const ll=l.toLowerCase();
    const found=STORES.find(s=>ll.includes(s));
    if(found){result.store=found.charAt(0).toUpperCase()+found.slice(1);break;}
  }

  // --- Date detection ---
  const dateRx=/\b(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})\b/;
  for(const l of lines){
    const m=l.match(dateRx);
    if(m){
      let[,d,mo,y]=m;
      if(y.length===2) y='20'+y;
      const dt=new Date(`${y}-${mo.padStart(2,'0')}-${d.padStart(2,'0')}`);
      if(!isNaN(dt)){result.date=dt.toISOString().slice(0,10);break;}
    }
  }

  // --- Last 4 card digits ---
  const cardRx=/(?:tarjeta|card|visa|master|débito|crédito).*?(\d{4})\b/i;
  const cardRx2=/\*{2,}(\d{4})\b/;
  for(const l of lines){
    let m=l.match(cardRx)||l.match(cardRx2);
    if(m){result.last4=m[1];break;}
  }

  // --- Total detection ---
  const totalRx=/(?:total|importe|a\s*pagar|sum[ao]?)[\s:]*(\d+[.,]\d{2})/i;
  const totalRx2=/^(\d+[.,]\d{2})\s*€?\s*$/;
  let totalCandidates=[];
  for(const l of lines){
    let m=l.match(totalRx);
    if(m){result.total=parseFloat(m[1].replace(',','.'));break;}
    m=l.match(totalRx2);
    if(m) totalCandidates.push(parseFloat(m[1].replace(',','.')));
  }
  if(!result.total&&totalCandidates.length) result.total=Math.max(...totalCandidates);

  // --- Product lines ---
  // Typical pattern: PRODUCT_NAME    PRICE or QTY x PRICE = TOTAL
  const priceRx=/(\d+[.,]\d{2})\s*[€]?\s*$/;
  const discountRx=/^[-–]\s*(\d+[.,]\d{2})/;
  const skipRx=/^(total|iva|impuesto|ticket|gracias|fecha|tarjeta|visa|master|cif|nif|tel[eé]f|efectivo|cambio|entrega|sum[ao]|subtotal|a\s*pagar|euros?|[*]{3,}|\d{4,})/i;

  let lastProduct=null;
  for(const line of lines){
    if(skipRx.test(line)) continue;
    // Discount line (starts with minus)
    const disc=line.match(discountRx);
    if(disc&&lastProduct){
      const d=parseFloat(disc[1].replace(',','.'));
      lastProduct.discount=(lastProduct.discount||0)+d;
      lastProduct.finalPrice=Math.max(0,lastProduct.finalPrice-d);
      lastProduct.price=lastProduct.finalPrice;
      continue;
    }
    const pm=line.match(priceRx);
    if(!pm) continue;
    const price=parseFloat(pm[1].replace(',','.'));
    if(price<=0||price>500) continue;
    const rawName=line.slice(0,line.lastIndexOf(pm[1])).replace(/\s+/g,' ').trim();
    if(rawName.length<2) continue;
    // Qty detection: "2 x 1,50" or "2x1,50"
    const qtyRx=/^(\d+)\s*[xX]\s*/;
    const qm=rawName.match(qtyRx);
    const qty=qm?parseInt(qm[1]):1;
    const cleanName=qm?rawName.slice(qm[0].length).trim():rawName;
    const prod={
      rawName:rawName,
      name:normalizeProdName(cleanName),
      price:price,finalPrice:price,
      discount:0,qty:qty,
      confidence:0.85,
      category:guessCat(cleanName),
      assignedTo:null,shared:true,pct1:50
    };
    result.products.push(prod);
    lastProduct=prod;
  }

  if(!result.store) result.errors.push('No se detectó el supermercado');
  if(!result.date) result.warnings.push('No se detectó la fecha');
  if(!result.last4) result.warnings.push('No se detectó tarjeta bancaria');
  if(result.products.length===0) result.errors.push('No se detectaron productos');

  return result;
}

function normalizeProdName(raw){
  // Expand common abbreviations found in Spanish supermarket tickets
  const abbr={
    'LT':'litro','KG':'kg','GR':'g','GRS':'g','ML':'ml','UDS':'uds',
    'FRESC':'fresco','FRES':'fresco','BIO':'bio','ECO':'eco',
    'NAT':'natural','NAT.':'natural','DESC':'descafeinado',
    'INT':'integral','INTEG':'integral','SIN GLUT':'sin gluten',
    'PECH':'pechuga','CONT':'control','PROT':'proteico','ORIG':'original',
    'CHOC':'chocolate','VAN':'vainilla','FRES':'fresa',
    '0%':'0%','S/SAL':'sin sal'
  };
  let name=raw.toUpperCase();
  // Replace abbreviations
  Object.entries(abbr).forEach(([k,v])=>{name=name.replace(new RegExp('\\b'+k+'\\b','g'),v.toUpperCase());});
  // Title case
  name=name.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());
  return name.trim();
}

const CAT_KEYWORDS={
  alimentación:['arroz','pasta','aceite','sal','azucar','harina','conserva','lata','tomate','atun','sardina','bote','sopa','caldo','legumbre','garbanzo','lenteja','alubia','galleta','bollería','cereal','pan','tostada'],
  lácteos:['leche','yogur','queso','mantequilla','nata','kefir','batido','vegetal'],
  fruta:['manzana','naranja','plátano','tomate','lechuga','zanahoria','cebolla','ajo','pimiento','fruta','verdura','ensalada','espinaca','brocoli','puerro'],
  carne:['pollo','cerdo','ternera','pechuga','filete','lomo','jamón','chorizo','salchich','bacon','carne'],
  pescado:['salmón','merluza','atún','bacalao','gamba','mejillón','calamar','pescado','marisco','sardin'],
  bebidas:['agua','zumo','refresco','cerveza','vino','cola','fanta','sprite','nestea','café','té','infusion'],
  higiene:['jabón','gel','champú','dentif','pasta dent','colonia','desodorante','afeitad','pañal','compresas','higien','papel higienico','papel wc'],
  limpieza:['detergente','suavizante','lejia','limpiador','bayeta','fregasuelos','lavaplatos','limpiacristal','insecticida','papel cocina','bolsa basura'],
  congelados:['helado','pizza','congelado'],
};
function guessCat(name){
  const nl=name.toLowerCase();
  for(const[cat,kws]of Object.entries(CAT_KEYWORDS)){
    if(kws.some(k=>nl.includes(k))) return cat;
  }
  return'otro';
}

// ── TICKET PROCESSING: OCR → PARSER → (AI fallback) ───────────
async function processFile(file){
  showOCRLoading('Preparando imagen...');
  try{
    if(file.type==='application/pdf'){
      hideOCRLoading();
      showToast('Los PDFs no son compatibles con OCR. Usa el modo manual.',4000);
      openTicketEditor(getEmptyTicket());
      return;
    }

    // 1. Resize → blob URL
    setOCRStatus('Optimizando imagen...');
    const blobUrl = await resizeImageToBlob(file, 1400);

    // 2. Tesseract OCR local
    setOCRStatus('Iniciando OCR...');
    let worker;
    try{
      worker = await Tesseract.createWorker('eng', 1, {
        workerPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/worker.min.js',
        langPath: 'https://tessdata.projectnaptha.com/4.0.0',
        corePath: 'https://cdn.jsdelivr.net/npm/tesseract.js-core@4/tesseract-core.wasm.js',
        logger: m => {
          if(m.status==='recognizing text')
            setOCRStatus('OCR: ' + Math.round((m.progress||0)*100) + '%');
        }
      });
    }catch(e){
      throw new Error('No se pudo iniciar Tesseract: ' + e.message);
    }

    let ocrText = '';
    try{
      const {data} = await worker.recognize(blobUrl);
      ocrText = data.text || '';
    }finally{
      await worker.terminate();
      URL.revokeObjectURL(blobUrl);
    }

    if(!ocrText || ocrText.trim().length < 20){
      const empty = getEmptyTicket();
      empty.errors = ['El OCR no extrajo texto suficiente. Revisa la imagen o introduce manualmente.'];
      hideOCRLoading();
      openTicketEditor(empty);
      return;
    }

    // 3. Local JS parser
    setOCRStatus('Analizando ticket...');
    let result = parseTicketText(ocrText);
    result.ocrRaw = ocrText;

    // 4. AI fallback only if parser found 0 products AND api key exists
    if(result.products.length === 0 && DB.apiKey){
      setOCRStatus('Parser sin resultados. Usando IA (solo texto)...');
      try{
        const aiResult = await analyzeWithGeminiTextOnly(ocrText);
        result = aiResult;
        result.ocrRaw = ocrText;
      }catch(e){
        result.warnings = result.warnings || [];
        result.warnings.push('IA no disponible: ' + e.message);
      }
    }

    // 5. Apply knowledge + metadata
    result.products = (result.products||[]).map(p => applyKnowledgeToProduct(p));
    result.type = 'ticket';
    result.id = uid();
    result.payer = DB.persons[0].id;
    result.confirmed = false;
    result.createdAt = new Date().toISOString();
    if(result.last4 && DB.knowledge.cards[result.last4])
      result.payer = DB.knowledge.cards[result.last4];

    hideOCRLoading();
    openTicketEditor(result);

  }catch(err){
    hideOCRLoading();
    showToast('Error: ' + err.message, 4000);
    openTicketEditor(getEmptyTicket());
  }
}

// ── GEMINI TEXT-ONLY FALLBACK ─────────────────────────────────
async function analyzeWithGeminiTextOnly(ocrText){
  const knownProds=Object.entries(DB.knowledge.products).slice(0,8)
    .map(([k,v])=>`${k}→${v.shared?'común':personName(v.person)}`).join(', ');
  const prompt=`Analiza este texto de un ticket de supermercado español y devuelve SOLO JSON sin markdown:
{"store":"","date":"YYYY-MM-DD o null","total":0,"last4":"4 dígitos o null","products":[{"rawName":"","name":"nombre legible","price":0,"discount":0,"qty":1,"confidence":0.8,"category":"alimentación|higiene|limpieza|bebidas|lácteos|fruta|carne|pescado|otro"}],"errors":[],"warnings":[]}
Normaliza nombres (SAL TO 500G→Salsa tomate 500g). Detecta descuentos.${knownProds?` Conocidos: ${knownProds}`:''}

TEXTO DEL TICKET:
${ocrText.slice(0,3000)}`;

  const text=await callGemini(prompt);

function applyKnowledgeToProduct(prod){
  const key=normalizeKey(prod.name||prod.rawName||'');
  const known=DB.knowledge.products[key];
  if(known){
    prod.assignedTo=known.shared?null:known.person;
    prod.shared=known.shared; prod.pct1=known.pct1||50; prod.knownMatch=true;
  } else {
    const ocrKey=(prod.rawName||'').trim().toUpperCase();
    const ocrMatch=Object.values(DB.knowledge.products).find(v=>v.ocr_raw?.includes(ocrKey));
    if(ocrMatch){prod.assignedTo=ocrMatch.shared?null:ocrMatch.person;prod.shared=ocrMatch.shared;prod.pct1=ocrMatch.pct1||50;prod.knownMatch=true;}
    else{prod.assignedTo=null;prod.shared=true;prod.pct1=50;}
  }
  prod.finalPrice=prod.price;
  return prod;
}

// ── BALANCE CALC ───────────────────────────────────────────────
function calcBalance(){
  const paid={};
  DB.persons.forEach(p=>paid[p.id]=0);
  const owedTo={};
  DB.persons.forEach(p=>owedTo[p.id]=0);

  DB.tickets.filter(t=>t.confirmed).forEach(t=>{
    const payerId=t.payer;
    if(!paid[payerId]) paid[payerId]=0;
    (t.products||[]).forEach(prod=>{
      const price=parseFloat(prod.finalPrice||prod.price||0);
      if(isNaN(price)||price<=0) return;
      paid[payerId]=(paid[payerId]||0)+price;
      if(prod.assignedTo){
        // personal product — payer fronts it, person owes if different
        if(prod.assignedTo!==payerId) owedTo[payerId]=(owedTo[payerId]||0)+price;
      } else {
        // shared
        DB.persons.forEach(p=>{
          if(p.id===payerId) return;
          const pct = prod.pct1!==undefined
            ? (p.id===DB.persons[0].id ? prod.pct1 : 100-prod.pct1)
            : 100/DB.persons.length;
          owedTo[payerId]=(owedTo[payerId]||0)+price*pct/100;
        });
      }
    });
  });

  DB.expenses.filter(e=>e.confirmed).forEach(e=>{
    const amt=parseFloat(e.total||0);if(isNaN(amt)||amt<=0) return;
    const payerId=e.payer;
    paid[payerId]=(paid[payerId]||0)+amt;
    const split1=e.split1!==undefined?e.split1:100/DB.persons.length;
    DB.persons.forEach((p,i)=>{
      if(p.id===payerId) return;
      const pct=i===0?split1:100-split1;
      owedTo[payerId]=(owedTo[payerId]||0)+amt*pct/100;
    });
  });

  // Net: find who owes whom
  // For 2 persons: simple net
  let owes=null,amount=0;
  if(DB.persons.length===2){
    const n=( owedTo[DB.persons[0].id]||0)-(owedTo[DB.persons[1].id]||0);
    if(n>0.005){owes=DB.persons[1].id;amount=n;}
    else if(n<-0.005){owes=DB.persons[0].id;amount=-n;}
  }

  return {paid,owes,amount};
}

function renderStats(){
  const now=new Date();
  const allT=DB.tickets.filter(t=>t.confirmed);
  const monthT=allT.filter(t=>t.date&&new Date(t.date).getMonth()===now.getMonth()&&new Date(t.date).getFullYear()===now.getFullYear());
  const monthTotal=monthT.reduce((s,t)=>s+(parseFloat(t.total)||0),0);

  const catMap={};
  allT.forEach(t=>(t.products||[]).forEach(p=>{const c=p.category||'otro';catMap[c]=(catMap[c]||0)+parseFloat(p.finalPrice||p.price||0);}));
  DB.expenses.filter(e=>e.confirmed).forEach(e=>{const c=e.category||'otro';catMap[c]=(catMap[c]||0)+parseFloat(e.total||0);});
  const catSorted=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const catMax=catSorted[0]?catSorted[0][1]:1;

  const storeMap={};
  allT.forEach(t=>{if(t.store)storeMap[t.store]=(storeMap[t.store]||0)+(parseFloat(t.total)||0);});
  const storeSorted=Object.entries(storeMap).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const anomalies=detectAnomalies();

  document.getElementById('view').innerHTML=`
    <div class="screen-header"><h1>Estadísticas</h1><p>Análisis del hogar</p></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Este mes</div><div class="stat-value">${fmt(monthTotal)}</div></div>
      <div class="stat-card"><div class="stat-label">Tickets totales</div><div class="stat-value">${allT.length}</div></div>
    </div>
    ${anomalies.length?`<div style="margin:0 16px 14px">${anomalies.map(a=>`<div style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);border-radius:var(--rad-sm);padding:10px 12px;margin-bottom:8px;font-size:13px;color:#f59e0b">⚠️ ${a}</div>`).join('')}</div>`:''}
    ${catSorted.length?`<div class="recent-label">Gasto por categoría</div><div class="bar-chart">${catSorted.map(([cat,amt])=>{const ci=EXPENSE_CATS.find(c=>c.id===cat)||{label:cat,emoji:'📦'};return`<div class="bar-row"><div class="bar-name">${ci.emoji} ${ci.label}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(amt/catMax*100)}%;background:var(--accent)"></div></div><div class="bar-amt">${fmt(amt)}</div></div>`;}).join('')}</div>`:''}
    ${storeSorted.length?`<div class="recent-label">Supermercados</div><div class="bar-chart">${storeSorted.map(([s,a],i)=>{const cols=['var(--accent)','var(--green)','var(--blue)','var(--amber)','var(--red)'];return`<div class="bar-row"><div class="bar-name">🏪 ${s}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(a/storeSorted[0][1]*100)}%;background:${cols[i]}"></div></div><div class="bar-amt">${fmt(a)}</div></div>`;}).join('')}</div>`:''}
    <div class="recent-label">Despensa estimada</div>${renderInventorySection()}`;
}

function detectAnomalies(){
  const now=new Date();
  const msgs=[];
  const thisT=DB.tickets.filter(t=>t.confirmed&&t.date&&new Date(t.date).getMonth()===now.getMonth());
  const lastT=DB.tickets.filter(t=>t.confirmed&&t.date&&new Date(t.date).getMonth()===(now.getMonth()-1+12)%12);
  const tTotal=thisT.reduce((s,t)=>s+parseFloat(t.total||0),0);
  const lTotal=lastT.reduce((s,t)=>s+parseFloat(t.total||0),0);
  if(lTotal>0&&tTotal>lTotal*1.3) msgs.push(`Este mes gastáis un ${Math.round((tTotal/lTotal-1)*100)}% más que el mes pasado.`);
  return msgs;
}

function renderInventorySection(){
  const preds=getPredictions();
  if(!preds.length) return`<div class="empty-state" style="padding:20px"><p>Añade más tickets para estimar la despensa</p></div>`;
  return preds.slice(0,8).map(p=>{
    const pct=Math.max(0,Math.min(100,100-Math.round((p.days/p.freq)*100)));
    const col=pct<30?'var(--red)':pct<60?'var(--amber)':'var(--green)';
    return`<div class="inv-row"><div class="inv-name">${p.emoji} ${p.name}</div><div class="inv-bar-track"><div class="inv-bar-fill" style="width:${pct}%;background:${col}"></div></div><div class="inv-days">~${p.days}d</div></div>`;
  }).join('');
}

function getPredictions(){
  const ph={};
  DB.tickets.filter(t=>t.confirmed&&t.date).forEach(t=>{
    const d=new Date(t.date).getTime();
    (t.products||[]).forEach(p=>{
      const k=normalizeKey(p.name||'');if(!k)return;
      if(!ph[k])ph[k]={name:p.name,dates:[],category:p.category||'otro'};
      ph[k].dates.push(d);
    });
  });
  const now=Date.now(),catE={alimentación:'🥫',higiene:'🧴',limpieza:'🧹',bebidas:'🧃',lácteos:'🥛',fruta:'🍎',carne:'🥩',pescado:'🐟',otro:'📦'};
  return Object.values(ph).filter(v=>v.dates.length>=2).map(item=>{
    item.dates.sort((a,b)=>a-b);
    const gaps=[];for(let i=1;i<item.dates.length;i++)gaps.push((item.dates[i]-item.dates[i-1])/864e5);
    const avgFreq=gaps.reduce((s,g)=>s+g,0)/gaps.length;
    const daysSince=(now-item.dates[item.dates.length-1])/864e5;
    const daysLeft=Math.max(0,Math.round(avgFreq-daysSince));
    return{name:item.name,days:daysLeft,freq:Math.round(avgFreq),emoji:catE[item.category]||'🛒',detail:`Cada ~${Math.round(avgFreq)}d · hace ${Math.round(daysSince)}d`};
  }).sort((a,b)=>a.days-b.days);
}

}

function renderAIQuestion(q){
  return`<div class="ai-qa" id="qa-${q.id}">
    <div class="ai-qa-q">${q.question}</div>
    <div class="ai-qa-btns">
      ${(q.options||['Sí','No']).map(opt=>`<button class="ai-qa-btn" onclick="answerAIQuestion('${q.id}','${opt}')">${opt}</button>`).join('')}
      <button class="ai-qa-btn" onclick="answerAIQuestion('${q.id}','skip')" style="color:var(--txt3)">Saltar</button>
    </div>
  </div>`;
}

function answerAIQuestion(qid,answer){
  const q=DB.aiQuestions.find(x=>x.id===qid);if(!q)return;
  q.answered=true;q.answer=answer;
  if(q.type==='product_assign'&&answer!=='skip'){
    const key=normalizeKey(q.productName||'');
    if(key){
      const pid=DB.persons.find(p=>p.name===answer)?.id||null;
      DB.knowledge.products[key]={...(DB.knowledge.products[key]||{}),person:pid,shared:!pid,pct1:50};
    }
  }else if(q.type==='card_assign'&&answer!=='skip'){
    const pid=DB.persons.find(p=>p.name===answer)?.id;
    if(pid)DB.knowledge.cards[q.last4]=pid;
  }
  saveDB();updateAIBadge();
  const el=document.getElementById('qa-'+qid);
  if(el){el.style.opacity='.4';el.querySelector('.ai-qa-btns').innerHTML='<span style="font-size:12px;color:var(--txt2)">✓ Respondido</span>';}
}

async function sendAIMessage(){
  const input=document.getElementById('ai-input');
  const msg=input.value.trim();if(!msg)return;
  input.value='';
  DB.aiConvMessages.push({role:'user',content:msg});renderAIChat();
  const {paid,owes,amount}=calcBalance();
      const ctx=`Eres el asistente de Clarito, app de gastos compartidos. Personas: ${DB.persons.map(p=>p.name).join(', ')}. Balance: ${amount>0.01?personName(owes)+' debe '+fmt(amount):'al día'}. Tickets: ${DB.tickets.filter(t=>t.confirmed).length}. Responde en español, breve y amigable.`;
  try{
    const resp=await callGemini(ctx+'\nPregunta: '+msg);
    DB.aiConvMessages.push({role:'bot',content:resp});saveDB();renderAIChat();
    const msgs=document.getElementById('ai-messages');if(msgs)msgs.scrollTop=msgs.scrollHeight;
  }catch(err){
    DB.aiConvMessages.push({role:'bot',content:'Error: '+err.message});renderAIChat();
  }
}

function updateAIBadge(){
  const n=(DB.aiQuestions||[]).filter(q=>!q.answered).length;
  const b=document.getElementById('ai-badge');
  if(b){b.style.display=n>0?'flex':'none';b.textContent=n;}
}

function generateAIQuestions(ticket){
  const qs=[];
  if(ticket.last4&&!DB.knowledge.cards[ticket.last4]){
    qs.push({id:uid(),type:'card_assign',answered:false,last4:ticket.last4,question:`¿La tarjeta •••• ${ticket.last4} pertenece a...?`,options:DB.persons.map(p=>p.name)});
  }
  (ticket.products||[]).filter(p=>p.confidence<0.6&&!p.knownMatch).forEach(p=>{
    const key=normalizeKey(p.name||'');
    if(!DB.knowledge.products[key]){
      qs.push({id:uid(),type:'product_assign',answered:false,productName:p.name,question:`"${p.name}" (${fmt(p.finalPrice||0)}) · ¿De quién es?`,options:[...DB.persons.map(p=>p.name),'Compartido']});
    }
  });
  if(qs.length){DB.aiQuestions.push(...qs);saveDB();updateAIBadge();}
}

// ── BOOT ──────────────────────────────────────────────────────
loadDB();
const needsSetup=!DB.apiKey;
if(needsSetup){startSetup();}
else{document.getElementById('setup-screen').style.display='none';showScreen('home');updateAIBadge();}
</script>
