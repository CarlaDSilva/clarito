<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Clarito"/>
<meta name="theme-color" content="#0d0d0f"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.png"/>
<link rel="icon" href="icon.png" type="image/png"/>
<link rel="stylesheet" href="app.css"/>
<title>Clarito</title>
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash">
  <img id="splash-logo" src="icon.png" alt="Clarito"/>
  <div class="splash-title">Clarito</div>
  <div class="splash-sub">La contabilidad doméstica casi invisible</div>
</div>

<!-- HIDDEN FILE INPUTS -->
<input type="file" id="file-input" accept="image/*,application/pdf"/>
<input type="file" id="camera-input" accept="image/*" capture="environment"/>

<!-- AI CHAT BUTTON -->
<button class="ai-chat-btn" id="ai-chat-btn" onclick="openAIChat()" aria-label="Asistente IA">
  ?<span class="ai-badge" id="ai-badge" style="display:none">0</span>
</button>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <div id="view"></div>
  <nav id="nav">
    <button class="nav-btn active" id="nav-home" onclick="showScreen('home')">
      <svg viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Inicio</span>
    </button>
    <button class="nav-btn" id="nav-tickets" onclick="showScreen('tickets')">
      <svg viewBox="0 0 24 24" fill="none"><rect x="2" y="3" width="20" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>
      <span>Tickets</span>
    </button>
    <button class="nav-btn" id="nav-balance" onclick="showScreen('balance')">
      <svg viewBox="0 0 24 24" fill="none"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      <span>Balance</span>
    </button>
    <button class="nav-btn" id="nav-stats" onclick="showScreen('stats')">
      <svg viewBox="0 0 24 24" fill="none"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>Stats</span>
    </button>
    <button class="nav-btn" id="nav-settings" onclick="showScreen('settings')">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <span>Config</span>
    </button>
  </nav>
</div>

<!-- SETUP SCREEN -->
<div id="setup-screen" style="display:none">
  <div class="logo-wrap">
    <img class="logo-img" src="icon.png" alt="Clarito" onerror="this.style.display='none'"/>
    <div class="logo-big">Clarito</div>
  </div>
  <p style="color:var(--txt2);font-size:13px;margin-bottom:32px;text-align:center">La contabilidad doméstica casi invisible</p>
  <div id="setup-content" class="setup-step"></div>
</div>

<!-- OVERLAYS -->
<div id="ticket-editor" class="ticket-editor" style="display:none"></div>
<div id="me-sheet" class="me-sheet" style="display:none"></div>
<div id="ai-chat-sheet" class="ai-sheet" style="display:none"></div>
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="closeModal()">
  <div id="modal-sheet" class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>
<div id="ocr-loading" class="ocr-loading" style="display:none">
  <div class="spinner"></div>
  <div class="ocr-status" id="ocr-status">Analizando...</div>
</div>

<script src="app.js"></script>
</body>
</html>
